            if (ss.protection[pk] && typeof ss.protection[pk] === 'object') {
              shipSystemsConfig.protection[pk] = Object.assign({}, shipSystemsConfig.protection[pk], ss.protection[pk]);
            }
          }
        }
      }

      // Kick off all sprite downloads in parallel before sequential processing
      const preloadedSprites = {};
      for (const raw of data.weapons) {
        if (raw.sprite && raw.id) {
          const img = new Image();
          img.src = String(raw.sprite);
          preloadedSprites[String(raw.id)] = img;
        }
      }

      for (const raw of data.weapons) {
        const w = {
          id: String(raw.id || '').trim(),
          name: raw.name || raw.id || 'Weapon',
          enabled: raw.enabled !== false,
          type: raw.type || 'projectile',
          sprite: raw.sprite || '',
          barrelDetection: raw.barrelDetection || 'top',
          cooldown: Math.max(0.05, Number.isFinite(Number(raw.cooldown)) ? Number(raw.cooldown) : 0.5),
          clipSize: Math.max(0, Number.isFinite(Number(raw.clipSize)) ? Number(raw.clipSize) : 0),
          ammoPerShot: Math.max(1, Number.isFinite(Number(raw.ammoPerShot)) ? Number(raw.ammoPerShot) : 1),
          cost: Math.max(0, Number.isFinite(Number(raw.cost)) ? Number(raw.cost) : 0),
          batterySeconds: Math.max(0, Number.isFinite(Number(raw.batterySeconds)) ? Number(raw.batterySeconds) : 0),
          reloadSeconds: Math.max(0.2, Number.isFinite(Number(raw.reloadSeconds)) ? Number(raw.reloadSeconds) : 1.5),
          barrelMode: raw.barrelMode || '',
          muzzleSpacingScale: Number.isFinite(Number(raw.muzzleSpacingScale)) ? Number(raw.muzzleSpacingScale) : 1,
          rocketProjectileMode: raw.rocketProjectileMode || '',
          upgrades: raw.upgrades || {},
          projectile: raw.projectile || {},
          pattern: raw.pattern || { count: 1, spreadDeg: 0 },
          electric: raw.electric || {},
          rocket: raw.rocket || {},
          syringe: raw.syringe || {},
          flamethrower: raw.flamethrower || {},
          mayo: raw.mayo || {},
          muzzles: [{ x: 0, y: -SHIP_SIZE * 0.43 }]
        };
        if (!w.id) continue;

        if (w.sprite) {
          const img = preloadedSprites[w.id] || new Image();
          if (!preloadedSprites[w.id]) img.src = w.sprite;
          await decodeImageSafe(img);
          weaponImages[w.id] = img;
          w.muzzles = detectWeaponMuzzles(img, w.barrelDetection);
          if (w.type === 'rocket' || w.type === 'syringe') {
            const sorted = w.muzzles.slice().sort((a, b) => a.x - b.x);
            if (sorted.length >= 2) {
              w.muzzles = [sorted[0], sorted[sorted.length - 1]];
            } else {
              w.muzzles = [
                { x: -SHIP_SIZE * 0.24, y: SHIP_SIZE * 0.20 },
                { x:  SHIP_SIZE * 0.24, y: SHIP_SIZE * 0.20 }
              ];

            if (w.rocketProjectileMode === 'smallest') {
              const extracted = extractSmallestRocketPart(img);
              if (extracted && extracted.parts) {
                rocketPartImages[w.id] = extracted.parts;
                if (extracted.cleanedImage) {
                  weaponImages[w.id] = extracted.cleanedImage;
                }
              } else {
                rocketPartImages[w.id] = extractRocketParts(img);
              }
            } else {
              rocketPartImages[w.id] = extractRocketParts(img);
            }
          }
        }
        weaponCatalog.push(w);
        weaponMap[w.id] = w;
        if (w.cost <= 0) ownedWeaponIds[w.id] = true;
        const state = getWeaponRuntimeState(w);
        if ((w.type === 'rocket' || w.type === 'syringe') && state) {
          const cap = w.clipSize > 2 ? w.clipSize : getEffectiveRocketCapacity(w);
          state.rocketLoaded = Array(cap).fill(true);
          state.maxClip = cap;
          state.clip = cap;
          state.nextRocketSlot = 0;
        }
      }

      const defaultOwnedPrimary = Array.isArray(weaponEconomyConfig.defaultOwnedPrimary) ? weaponEconomyConfig.defaultOwnedPrimary : [];
      const defaultOwnedSecondary = Array.isArray(weaponEconomyConfig.defaultOwnedSecondary) ? weaponEconomyConfig.defaultOwnedSecondary : [];
      for (const id of defaultOwnedPrimary) {
        if (weaponMap[id]) ownedWeaponIds[id] = true;
      }
      for (const id of defaultOwnedSecondary) {
        if (weaponMap[id]) ownedWeaponIds[id] = true;
      }

      const ownedSecondary = weaponCatalog.find(w => w && (w.type === 'rocket' || w.type === 'syringe') && isWeaponOwned(w));
      currentRocketId = ownedSecondary ? ownedSecondary.id : 'none';

      const desired = String(data.defaultWeapon || '').trim();
      if (desired && weaponMap[desired] && isWeaponOwned(weaponMap[desired])) currentWeaponId = desired;

      }

      weaponConfigLoaded = true;
      renderUpgradeMenu();
    }

    async function loadEnemyConfigFromJson(){
      await Promise.all(imgUFO.map(decodeImageSafe));
      const data = (window && window.ENEMY_CONFIG && typeof window.ENEMY_CONFIG === 'object') ? window.ENEMY_CONFIG : null;

      if (data && typeof data === 'object') {
        const merged = Object.assign({}, enemyConfig, data);
        if (!merged.spaceBugs || typeof merged.spaceBugs !== 'object') merged.spaceBugs = enemyConfig.spaceBugs;
        if (!merged.levels || typeof merged.levels !== 'object') merged.levels = enemyConfig.levels;
        if (!Array.isArray(merged.ufoVariants) || !merged.ufoVariants.length) merged.ufoVariants = enemyConfig.ufoVariants;

    // === Ship orbit ===========================================================
    function updateShip(dt) {
      const target = angleTo(CX, CY, mouseX, mouseY);
      let da = target - shipAngle;
      while (da >  Math.PI) da -= Math.PI*2;
      while (da < -Math.PI) da += Math.PI*2;
      const engineLevel = Math.max(1, Number(shipUpgradeLevels.engine) || 1);
      const engineSpeedMult = Number(getShipSysLevel('engine', engineLevel).speedMult) || 1;
      shipAngle += da * Math.min(1, dt * 4.5 * engineSpeedMult);
    }
    function getShipPos() {
      return { x: CX+Math.cos(shipAngle)*ORBIT_RX, y: CY+Math.sin(shipAngle)*ORBIT_RY };
    }

    function resetShipArmorHits() {
      const armorLvl = Math.max(1, Number(shipUpgradeLevels.armor) || 1);
      shipArmorHitsLeft = Math.max(1, Number(getShipSysLevel('armor', armorLvl).hitsLeft) || armorLvl);
    }

    // === Button Protection Systems =============================================
    function getRandomEmptyPos(popW, popH) {
      const candidates = [
        { x: 30, y: 30 },
        { x: W - popW - 30, y: 30 },
        { x: 30, y: H - popH - 30 },
        { x: W - popW - 30, y: H - popH - 30 }
      ];
      const valid = candidates.filter(p => {
        const cx2 = Math.max(p.x, Math.min(CX, p.x + popW));
        const cy2 = Math.max(p.y, Math.min(CY, p.y + popH));
        return Math.hypot(cx2 - CX, cy2 - CY) > 160;
      });
      return valid[Math.floor(Math.random() * valid.length)] || candidates[0];
    }

    function updateProtectionSystems(dt) {
      if (phase !== 'game' || gamePaused) return;

      // Each and Everything Protection
      if (shipProtectionOwned.eachAndEverything) {
        if (eachProtection.active) {
          const pw = 310, ph = 105;
          for (const u of ufos) {
            if (!eachProtection.active || eachProtection.hitsLeft <= 0) break;
            if (u.dead || !eachProtection.active) continue;
            if (u.x >= eachProtection.x && u.x <= eachProtection.x + pw &&
                u.y >= eachProtection.y && u.y <= eachProtection.y + ph) {
              applyDamageToUfo(u, 9999);
              eachProtection.hitsLeft--;
              if (eachProtection.hitsLeft <= 0) {
                eachProtection.active = false;
                eachProtection.reloadTimer = Math.max(1, Number(getProtectCfg('eachAndEverything').reloadSeconds) || 30);
                playSound(audioConfig.events && audioConfig.events.eachAndEverything);
                break;
              }
            }
          }
        } else {
          eachProtection.reloadTimer -= dt;
          if (eachProtection.reloadTimer <= 0) activateEachProtection();
        }
      }

      // WWWWTSACTP Protection
      if (shipProtectionOwned.wwwwtsactp) {
        if (wwwwProtection.active) {
          const pw = 300, ph = 120;
          wwwwProtection.danceAngle += dt * 1.5;
          wwwwProtection.x += wwwwProtection.vx + Math.sin(wwwwProtection.danceAngle) * 1;
          wwwwProtection.y += wwwwProtection.vy + Math.cos(wwwwProtection.danceAngle * 0.7) * 0.75;
          if (wwwwProtection.x < 10)       { wwwwProtection.x = 10;       wwwwProtection.vx =  Math.abs(wwwwProtection.vx); }
          if (wwwwProtection.x > W-pw-10)  { wwwwProtection.x = W-pw-10;  wwwwProtection.vx = -Math.abs(wwwwProtection.vx); }
          if (wwwwProtection.y < 10)       { wwwwProtection.y = 10;       wwwwProtection.vy =  Math.abs(wwwwProtection.vy); }
          if (wwwwProtection.y > H-ph-10)  { wwwwProtection.y = H-ph-10;  wwwwProtection.vy = -Math.abs(wwwwProtection.vy); }
          for (const u of ufos) {
            if (!wwwwProtection.active || wwwwProtection.hitsLeft <= 0) break;
            if (u.dead || !wwwwProtection.active) continue;
            if (u.x >= wwwwProtection.x && u.x <= wwwwProtection.x + pw &&
                u.y >= wwwwProtection.y && u.y <= wwwwProtection.y + ph) {
              applyDamageToUfo(u, 9999);
              wwwwProtection.hitsLeft--;
              if (wwwwProtection.hitsLeft <= 0) { deactivateWWWWProtection(); break; }
            }
          }
        } else {
          wwwwProtection.reloadTimer -= dt;
          if (wwwwProtection.reloadTimer <= 0) activateWWWWProtection();
        }
      }

      // Seraph Secure Dome
      if (shipProtectionOwned.seraphSecure) {
        const ssMaxHits = Math.max(1, Number(getProtectCfg('seraphSecure').hitsLeft) || 3);
        if (!seraphDome.active) {
          // Destroyed - wait reloadSeconds then reactivate at full health
          seraphDome.reloadTimer -= dt;
          if (seraphDome.reloadTimer <= 0) {
            seraphDome.active = true;
            seraphDome.hitsLeft = ssMaxHits;
            seraphDome.crackLevel = 0;
            seraphDome.regenTimer = 0;
          }
        } else {
          // Active - regen 1 hit per second if damaged
          if (seraphDome.hitsLeft < ssMaxHits) {
            seraphDome.regenTimer += dt;
            if (seraphDome.regenTimer >= 1) {
              seraphDome.regenTimer -= 1;
              seraphDome.hitsLeft = Math.min(ssMaxHits, seraphDome.hitsLeft + 1);
              seraphDome.crackLevel = Math.max(0, ssMaxHits - seraphDome.hitsLeft);
            }
          } else {
            seraphDome.regenTimer = 0;
          }
        }
        seraphDome.visible = seraphDome.active && ufos.some(u => !u.dead && dist(u.x, u.y, CX, CY) < 300);
      }
    }

    const _win95Cache = new Map();
    function _renderWin95ToCtx(c, w, h, title, lines, logoImg) {
      // All coordinates are local (0,0 = top-left of popup body)
      c.save();
      c.shadowColor = 'transparent'; c.shadowBlur = 0;
      // Drop shadow at offset (5,5)
      c.fillStyle = 'rgba(0,0,0,0.35)';
      c.fillRect(5, 5, w, h);
      // Main gray body
      c.fillStyle = '#c0c0c0';
      c.fillRect(0, 0, w, h);
      // 3D raised outer border
      c.lineWidth = 2;
      c.strokeStyle = '#ffffff';
      c.beginPath(); c.moveTo(w - 1, 0); c.lineTo(0, 0); c.lineTo(0, h - 1); c.stroke();
      c.strokeStyle = '#808080';
      c.beginPath(); c.moveTo(w - 1, 0); c.lineTo(w - 1, h - 1); c.lineTo(0, h - 1); c.stroke();
      // Title bar
      const titleH = 22;
      const grad = c.createLinearGradient(2, 2, w - 2, 2);
      grad.addColorStop(0, '#000080'); grad.addColorStop(1, '#1084d0');
      c.fillStyle = grad;
      c.fillRect(2, 2, w - 4, titleH);
      // Title text
      c.fillStyle = '#ffffff';
      c.font = 'bold 11px Arial, sans-serif';
      c.textAlign = 'left'; c.textBaseline = 'middle';
      c.fillText(title, 8, 2 + titleH / 2);
      // Close button
      const cbS = 14, cbY2 = 4, cbX2 = w - 4 - cbS;
      c.fillStyle = '#c0c0c0'; c.fillRect(cbX2, cbY2, cbS, cbS);
      c.strokeStyle = '#ffffff'; c.lineWidth = 1;
      c.beginPath(); c.moveTo(cbX2 + cbS, cbY2); c.lineTo(cbX2, cbY2); c.lineTo(cbX2, cbY2 + cbS); c.stroke();
      c.strokeStyle = '#808080';
      c.beginPath(); c.moveTo(cbX2 + cbS, cbY2); c.lineTo(cbX2 + cbS, cbY2 + cbS); c.lineTo(cbX2, cbY2 + cbS); c.stroke();
      c.fillStyle = '#000'; c.font = 'bold 9px Arial'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('\u2715', cbX2 + cbS / 2, cbY2 + cbS / 2);
      // Minimize button
      const mbX = cbX2 - cbS - 2;
      c.fillStyle = '#c0c0c0'; c.fillRect(mbX, cbY2, cbS, cbS);
      c.strokeStyle = '#ffffff'; c.lineWidth = 1;
      c.beginPath(); c.moveTo(mbX + cbS, cbY2); c.lineTo(mbX, cbY2); c.lineTo(mbX, cbY2 + cbS); c.stroke();
      c.strokeStyle = '#808080';
      c.beginPath(); c.moveTo(mbX + cbS, cbY2); c.lineTo(mbX + cbS, cbY2 + cbS); c.lineTo(mbX, cbY2 + cbS); c.stroke();
      c.fillStyle = '#000'; c.fillRect(mbX + 3, cbY2 + cbS - 5, cbS - 6, 2);
      // Content area
      const contentY = 2 + titleH + 2;
      const contentH = h - titleH - 4;
      let textOffX = 10;
      if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
        const ls = Math.min(40, contentH - 12);
        c.drawImage(logoImg, 8, contentY + (contentH - ls) / 2 - 8, ls, ls);
        textOffX = ls + 16;
      }
      c.fillStyle = '#000';
      c.font = '11px Arial, sans-serif'; c.textAlign = 'left'; c.textBaseline = 'top';
      let ly = contentY + 8;
      for (const line of lines) { c.fillText(line, textOffX, ly); ly += 14; }
      // OK button
      const okW = 52, okH = 18, okX = w - okW - 8, okY = h - okH - 6;
      c.fillStyle = '#c0c0c0'; c.fillRect(okX, okY, okW, okH);
      c.strokeStyle = '#ffffff'; c.lineWidth = 1;
      c.beginPath(); c.moveTo(okX + okW, okY); c.lineTo(okX, okY); c.lineTo(okX, okY + okH); c.stroke();
      c.strokeStyle = '#808080';
      c.beginPath(); c.moveTo(okX + okW, okY); c.lineTo(okX + okW, okY + okH); c.lineTo(okX, okY + okH); c.stroke();
      c.fillStyle = '#000'; c.font = '11px Arial, sans-serif'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('OK', okX + okW / 2, okY + okH / 2);
      c.restore();
    }
    function drawWin95Popup(x, y, w, h, title, lines, logoImg) {
      const logoReady = !logoImg || (logoImg.complete && logoImg.naturalWidth > 0);
      const key = title + '|' + w + '|' + h + '|' + (logoReady ? '1' : '0');
      let cached = _win95Cache.get(key);
      if (!cached) {
        cached = new OffscreenCanvas(w + 6, h + 6);
        _renderWin95ToCtx(cached.getContext('2d'), w, h, title, lines, logoImg);
        _win95Cache.set(key, cached);
      }
      ctx.drawImage(cached, x, y);
    }

    function drawSeraphDome(t) {
      if (!shipProtectionOwned.seraphSecure || !seraphDome.visible) return;
      const x = CX, y = CY, r = Math.max(20, Number(getProtectCfg('seraphSecure').domeRadius) || 62);
      ctx.save();
      const pulse = 0.35 + 0.12 * Math.sin(t * 4);
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(60,120,220,' + (pulse * 0.35) + ')';
      ctx.fill();
      ctx.strokeStyle = 'rgba(100,180,255,' + (pulse + 0.4) + ')';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#60a0ff'; ctx.shadowBlur = 14;
      ctx.stroke();
      // Logo inside dome - fill circle with small padding
      if (imgSeraphSecureIcon.complete && imgSeraphSecureIcon.naturalWidth > 0) {
        const logoSize = (r - 6) * 2;
        ctx.globalAlpha = 0.6 + 0.18 * Math.sin(t * 2.5);
        ctx.drawImage(imgSeraphSecureIcon, x - logoSize / 2, y - logoSize / 2, logoSize, logoSize);
        ctx.globalAlpha = 1;
      }
      // Crack lines
      ctx.shadowColor = '#ffcc44'; ctx.shadowBlur = 5;
      ctx.strokeStyle = 'rgba(255,210,80,0.9)'; ctx.lineWidth = 1.5;
      if (seraphDome.crackLevel >= 1) {
        const a1 = -0.8;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(a1) * r, y + Math.sin(a1) * r);
        ctx.lineTo(x + Math.cos(a1) * r * 0.55, y + Math.sin(a1) * r * 0.55);
        ctx.lineTo(x + Math.cos(a1 + 0.35) * r * 0.3, y + Math.sin(a1 + 0.35) * r * 0.3);
        ctx.stroke();
      }
      if (seraphDome.crackLevel >= 2) {
        const a2 = 1.1;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(a2) * r, y + Math.sin(a2) * r);
        ctx.lineTo(x + Math.cos(a2) * r * 0.5, y + Math.sin(a2) * r * 0.5);
        ctx.lineTo(x + Math.cos(a2 - 0.3) * r * 0.28, y + Math.sin(a2 - 0.3) * r * 0.28);
        ctx.stroke();
      }
      ctx.restore();
    }

    // === Game firing / spawning / explosion (same as before) =================
    function fireCurrentWeapon() {
      const weapon = getCurrentWeapon();
      if (!weapon || weapon.type === 'disabled') return false;
      if (weapon.type === 'electric' || weapon.type === 'flamethrower') return false;

      const state = getWeaponRuntimeState(weapon);
      if (!state) return false;
      if (state.reloading) {
        playSound(audioConfig.events && audioConfig.events.emptyClip);
        return false;
      }
      const ammoPerShot = Math.max(1, Number(weapon.ammoPerShot) || 1);
      if (state.clip < ammoPerShot) {
        playSound(audioConfig.events && audioConfig.events.emptyClip);
        startWeaponReload(weapon, state);
        return false;
      }

      const muzzles = getWeaponWorldMuzzles(weapon);
      const spreadOffsets = buildSpreadOffsets(weapon.pattern.count, weapon.pattern.spreadDeg);
      for (const m of muzzles) {
        const mx = m.x;
        const my = m.y;
        for (const offset of spreadOffsets) {
          spawnProjectile(mx, my, shipAngle + offset, weapon.projectile, weapon);
        }
      }
      state.clip = Math.max(0, state.clip - ammoPerShot);
      playSound(getWeaponShotSoundKey(weapon));
      if (state.clip <= 0) startWeaponReload(weapon, state);
      return true;
    }

    function updateElectricWeapon(dt) {
      electricBolts = [];
      const weapon = getCurrentWeapon();
      if (!weapon || weapon.type !== 'electric') {
        stopLoopSound('electric');
        return;
      }
      const state = getWeaponRuntimeState(weapon);
      if (!state) {
        stopLoopSound('electric');
        return;
      }
      if (state.reloading) {
        electricTargetIds = [];
        stopLoopSound('electric');
        return;
      }
      if (!fireHeld || !shipAlive || gamePaused) {
        electricTargetIds = [];
        stopLoopSound('electric');
        return;
      }

      const sp = getShipPos();
      const muzzlePoints = getWeaponWorldMuzzles(weapon);
      const range = Number.isFinite(Number(weapon.electric.range)) ? Number(weapon.electric.range) : W * 0.5;
      const maxTargets = Math.max(1, Number.isFinite(Number(weapon.electric.maxTargets)) ? Number(weapon.electric.maxTargets) : 1);
      const dps = Math.max(0.2, Number.isFinite(Number(weapon.electric.damagePerSecond)) ? Number(weapon.electric.damagePerSecond) : 1.7);

      const byId = new Map();
      for (const u of ufos) {
        if (u.dead) continue;
        byId.set(u.id, u);
      }

      electricTargetIds = electricTargetIds.filter(id => {
        const u = byId.get(id);
        return !!u && dist(sp.x, sp.y, u.x, u.y) <= range;
      });

      if (electricTargetIds.length < maxTargets) {
        const extras = ufos
          .filter(u => !u.dead && dist(sp.x, sp.y, u.x, u.y) <= range && !electricTargetIds.includes(u.id))
          .sort((a, b) => dist(sp.x, sp.y, a.x, a.y) - dist(sp.x, sp.y, b.x, b.y));
        for (const u of extras) {
          if (electricTargetIds.length >= maxTargets) break;
          electricTargetIds.push(u.id);
        }
      }

      for (let idx = 0; idx < electricTargetIds.length; idx++) {
        const id = electricTargetIds[idx];
        const u = byId.get(id);
        if (!u) continue;
        const muzzle = muzzlePoints.length ? muzzlePoints[idx % muzzlePoints.length] : sp;
        electricBolts.push({
          sx: muzzle.x,
          sy: muzzle.y,
          tx: u.x,
          ty: u.y,
          color: weapon.electric.color || '#84ecff',
          thickness: Math.max(1, Number(weapon.electric.thickness) || 2)
        });
      }

      const activeBeams = electricBolts.length;
      if (activeBeams > 0) {
        setContinuousSound(
          'electric',
          true,
          null,
          audioConfig.continuous && audioConfig.continuous.electricLoopKey,
          0,
          1
        );
        const drain = dt * activeBeams;
        const scale = drain > 0 ? Math.min(1, state.battery / drain) : 1;
        for (let i = 0; i < activeBeams; i++) {
          const u = byId.get(electricTargetIds[i]);
          if (!u) continue;
          applyDamageToUfo(u, dps * dt * scale);
        }
        state.battery = Math.max(0, state.battery - drain);
        if (state.battery <= 0) {
          electricBolts = [];
          electricTargetIds = [];
          stopLoopSound('electric');
          startWeaponReload(weapon, state);
        }
      } else {
        stopLoopSound('electric');
      }

      electricTargetIds = electricTargetIds.filter(id => {
        const u = byId.get(id);
        return !!u && !u.dead;
      });
    }

    function updateFlamethrowerWeapon(dt) {
      flamethrowerFiring = false;
      flamethrowerData   = null;
      const weapon = getCurrentWeapon();
      if (!weapon || weapon.type !== 'flamethrower') {
        stopLoopSound('flamethrower');
        return;
      }
      const state = getWeaponRuntimeState(weapon);
      if (!state || state.reloading) {
        stopLoopSound('flamethrower');
        return;
      }
      if (!fireHeld || !shipAlive || gamePaused) {
        stopLoopSound('flamethrower');
        return;
      }

      const cfg = weapon.flamethrower || {};
      const range = getEffectiveFlamethrowerRange(weapon);
      const halfCone = ((Number.isFinite(Number(cfg.coneAngleDeg)) ? Number(cfg.coneAngleDeg) : 22) / 2) * (Math.PI / 180);
      const dps = Number.isFinite(Number(cfg.damagePerSecond)) ? Number(cfg.damagePerSecond) : 3.5;
      const pSize = Number.isFinite(Number(cfg.particleSize)) ? Number(cfg.particleSize) : 16;

      // Use actual barrel-tip muzzle position instead of ship center
      const muzzles = getWeaponWorldMuzzles(weapon);
      const muzzle = muzzles.length ? muzzles[0] : getShipPos();

      flamethrowerFiring = true;
      flamethrowerData = { muzzle, angle: shipAngle, range, halfCone, weapon };
      setContinuousSound(
        'flamethrower',
        true,
        audioConfig.continuous && audioConfig.continuous.flamethrowerStartKey,
        audioConfig.continuous && audioConfig.continuous.flamethrowerLoopKey,
        audioConfig.continuous && audioConfig.continuous.flamethrowerLoopDelayMs,
        1
      );

      // Spawn fire blob particles each frame -- speed derived from range so particles reach damage distance
      const isBlue = weapon.id === 'flamethrower2';
      const fireColors = isBlue
        ? ['#00b4ff', '#40c8ff', '#80e0ff', '#60d0ff', '#20a8ff']
        : ['#ff6600', '#ff9900', '#ffcc00', '#ff4400', '#ff7700'];
      const pCount = 10;
      const damagePerParticle = (dps * dt) / Math.max(1, pCount * 0.55);
      for (let i = 0; i < pCount; i++) {
        const spreadA = (Math.random() - 0.5) * halfCone * 2;
        const a = shipAngle + spreadA;
        const life = 0.8 + Math.random() * 0.3;             // 0.8-1.1
        const decay = 0.016 + Math.random() * 0.014;        // 0.016-0.03
        const speed = range * decay / life;                  // distance ~= range
        const c = fireColors[Math.floor(Math.random() * fireColors.length)];
        particles.push({
          x: muzzle.x + (Math.random() - 0.5) * 4,
          y: muzzle.y + (Math.random() - 0.5) * 4,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          r: pSize * 0.5 * (0.6 + Math.random() * 0.7),
          life, decay, color: c, noGravity: true,
          weaponHitType: 'flame',
          hitDamage: damagePerParticle,
          hitIds: new Set(),
          maxHits: 2
        });
      }

      state.battery = Math.max(0, state.battery - dt);
      if (state.battery <= 0) {
        flamethrowerFiring = false;
        flamethrowerData   = null;
        stopLoopSound('flamethrower');
        startWeaponReload(weapon, state);
      }
    }

    function updateMayoWeapon(dt) {
      mayoFiring = false;
      mayoData   = null;
      const weapon = getCurrentRocketWeapon();
      if (!weapon || weapon.type !== 'mayo') return;
      const state = getWeaponRuntimeState(weapon);
      if (!state || state.reloading) return;
      if (!rocketFireHeld || !shipAlive || gamePaused) return;

      const cfg = weapon.mayo || {};
      const range = getEffectiveMayoRange(weapon);
      const halfCone = ((Number.isFinite(Number(cfg.coneAngleDeg)) ? Number(cfg.coneAngleDeg) : 28) / 2) * (Math.PI / 180);
      const slowDur = Number.isFinite(Number(cfg.slowDuration)) ? Number(cfg.slowDuration) : 4;
      const corrosiveDps = Number.isFinite(Number(cfg.corrosiveDps)) ? Number(cfg.corrosiveDps) : 0;
      const pSize = Number.isFinite(Number(cfg.particleSize)) ? Number(cfg.particleSize) : 14;

      // Use actual barrel-tip muzzle positions for both barrels
      const rawMuzzles = getWeaponWorldMuzzles(weapon);
      const sp = getShipPos();
      const mayoMuzzles = rawMuzzles.length >= 2 ? rawMuzzles : rawMuzzles.length === 1 ? [rawMuzzles[0], rawMuzzles[0]] : [sp, sp];

      mayoFiring = true;
      mayoData = { muzzles: mayoMuzzles, angle: shipAngle, range, halfCone, weapon };
      playSound(getWeaponShotSoundKey(weapon));

      // Spawn mayo blob particles from each barrel -- speed derived from range
      const isWasabi = weapon.id === 'wasabi_mayo';
      const mayoColors = isWasabi
        ? ['#a8e840', '#5dc420', '#c0f060', '#80d030', '#b0f050']
        : ['#f5f0a0', '#ffffd0', '#e8e090', '#d4c830', '#f0ebb0'];
      const frontNozzleOffset = Number.isFinite(Number(cfg.frontNozzleOffset)) ? Number(cfg.frontNozzleOffset) : 18;
      const nozzleDx = Math.cos(shipAngle) * frontNozzleOffset;
      const nozzleDy = Math.sin(shipAngle) * frontNozzleOffset;
      for (const m of mayoMuzzles) {
        const pCount = 7;
        for (let i = 0; i < pCount; i++) {
          const spreadA = (Math.random() - 0.5) * halfCone * 2;
          const a = shipAngle + spreadA;
          const life = 0.85 + Math.random() * 0.3;           // 0.85-1.15
          const decay = 0.014 + Math.random() * 0.014;       // 0.014-0.028
          const speed = range * decay / life;                 // distance ~= range
          const c = mayoColors[Math.floor(Math.random() * mayoColors.length)];
          particles.push({
            x: m.x + nozzleDx + (Math.random() - 0.5) * 4,
            y: m.y + nozzleDy + (Math.random() - 0.5) * 4,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed,
            r: pSize * 0.5 * (0.7 + Math.random() * 0.6),
            life, decay, color: c, noGravity: true,
            weaponHitType: 'mayo',
            mayoSlowDur: slowDur,
            mayoCorrosiveDps: corrosiveDps,
            mayoColor1: cfg.color1 || '#f5f0a0',
            mayoColor2: cfg.color2 || '#d4c830',
            hitIds: new Set(),
            maxHits: 1
          });
        }
      }

      state.battery = Math.max(0, state.battery - dt);
      if (state.battery <= 0) {
        mayoFiring = false;
        mayoData   = null;
        startWeaponReload(weapon, state);
      }
    }

    function applyDamageToUfo(u, damage) {
      if (!u || u.dead) return;
      u.hp -= damage;
      if (u.hp <= 0) {
        cash += Math.max(0, Number(u.score) || 0);
        updateCashCounter();
        u.dead = true;
        if (u.type === 'bug' || u.type === 'mother_bug' || u.type === 'egg') {
          spawnGooSplat(u.x, u.y, 0.5);
        } else {
          spawnExplosion(u.x, u.y);
          spawnFragments(u.x, u.y, getUfoFrameImage(u), u.size);
        }
      } else {
        u.hitFlash = 0.16;
        u.crackDirty = true;
      }
    }

    function createSpaceBugEnemy(kind, x, y, opts) {
      const o = opts || {};
      const bugConfig = (enemyConfig && enemyConfig.spaceBugs && enemyConfig.spaceBugs[kind]) ? enemyConfig.spaceBugs[kind] : null;
      const isMother = kind === 'mother_bug';
      const adultSpeed = Number.isFinite(Number(bugConfig && bugConfig.speed)) ? Number(bugConfig.speed) : (isMother ? UFO_SPEED * 0.75 : UFO_SPEED * 1.22);
      const adultSize = Number.isFinite(Number(bugConfig && bugConfig.size)) ? Number(bugConfig.size) : (isMother ? UFO_SIZE * 1.16 : UFO_SIZE * 0.92);
      const adultHp = Math.max(1, Number.isFinite(Number(bugConfig && bugConfig.hp)) ? Number(bugConfig.hp) : (isMother ? 5 : 2));
      const juvenile = !!o.juvenile;
      const initialHp = juvenile
        ? Math.max(1, Number.isFinite(Number(bugConfig && bugConfig.juvenileHp)) ? Number(bugConfig.juvenileHp) : 1)
        : adultHp;
      const initialScale = juvenile
        ? Math.max(0.05, Number.isFinite(Number(bugConfig && bugConfig.juvenileScale)) ? Number(bugConfig.juvenileScale) : 0.45)
        : 0;
      const growthDuration = Math.max(0.2, Number.isFinite(Number(bugConfig && bugConfig.growthDuration)) ? Number(bugConfig.growthDuration) : (isMother ? 5 : 3));
      const juvenileSpeed = juvenile
        ? adultSpeed * Math.max(0.2, Number.isFinite(Number(bugConfig && bugConfig.juvenileSpeedMultiplier)) ? Number(bugConfig.juvenileSpeedMultiplier) : (isMother ? 0.9 : 0.7))
        : adultSpeed;
      const canLayEgg = !!(bugConfig && bugConfig.canLayEgg);
      const eggSpawnInterval = Math.max(0.2, Number.isFinite(Number(bugConfig && bugConfig.eggSpawnInterval)) ? Number(bugConfig.eggSpawnInterval) : 2);
      const score = Math.max(0, Number.isFinite(Number(bugConfig && bugConfig.score)) ? Number(bugConfig.score) : (isMother ? 240 : 120));
      return {
        id: nextUfoId++,
        x, y,
        type: kind,
        frame: 0,
        frameTick: 0,
        animFrames: [0, 1, 2, 1], // frame 4 is a duplicate of frame 2, so we loop 1-2-3-2.
        frames: isMother ? motherBugFrames : bugFrames,
        scale: initialScale,
        dead: false,
        hp: initialHp,
        maxHp: juvenile ? 1 : adultHp,
        hitFlash: 0,
        crackSeed: Math.random() * Math.PI * 2,
        speed: juvenileSpeed,
        adultSpeed,
        size: adultSize,
        score,
        isJuvenile: juvenile,
        growthTimer: juvenile ? 0 : growthDuration,
        growthDuration,
        canLayEgg: canLayEgg && !juvenile,
        eggTimer: eggSpawnInterval,
        eggSpawnInterval,
        adultType: kind,
        wanderPhase: rand(0, Math.PI * 2),
        wanderOffset: rand(-0.5, 0.5),
        wanderTarget: rand(-0.8, 0.8),
        wanderTimer: rand(0.2, 0.7)
      };
    }

    function createEggEnemy(x, y, opts) {
      const o = opts || {};
      const eggConfig = (enemyConfig && enemyConfig.spaceBugs && enemyConfig.spaceBugs.egg) ? enemyConfig.spaceBugs.egg : {};
      return {
        id: nextUfoId++,
        x, y,
        type: 'egg',
        frame: 0,
        frameTick: 0,
        frames: eggFrames,
        scale: 0,
        dead: false,
        hp: 1,
        maxHp: 1,
        hitFlash: 0,
        crackSeed: Math.random() * Math.PI * 2,
        speed: 0,
        size: Number.isFinite(Number(eggConfig.size)) ? Number(eggConfig.size) : UFO_SIZE * 0.25,
        score: Number.isFinite(Number(eggConfig.score)) ? Number(eggConfig.score) : 90,
        hatchTimer: Number.isFinite(Number(o.hatchTimer)) ? Number(o.hatchTimer) : (Number.isFinite(Number(eggConfig.hatchTimer)) ? Number(eggConfig.hatchTimer) : 3),
        postHatchTimer: 0,
        postHatchTimerDuration: Number.isFinite(Number(eggConfig.postHatchTimer)) ? Number(eggConfig.postHatchTimer) : 0.7,
        hatched: false
      };
    }

    function spawnEggFromMother(mother) {
      const a = angleTo(CX, CY, mother.x, mother.y) + rand(-0.5, 0.5);
      const d = mother.size * rand(0.18, 0.35);
      const x = mother.x + Math.cos(a) * d;
      const y = mother.y + Math.sin(a) * d;
      ufos.push(createEggEnemy(x, y));
    }

    function hatchEgg(egg) {
      const hatchPool = enemyConfig && enemyConfig.spaceBugs && Array.isArray(enemyConfig.spaceBugs.hatchWeights)
        ? enemyConfig.spaceBugs.hatchWeights
        : [{ type: 'bug', weight: 80 }, { type: 'mother_bug', weight: 20 }];
      const hatchPick = pickWeightedOption(hatchPool);
      const adultType = hatchPick && hatchPick.type ? hatchPick.type : 'bug';
      const hatchling = createSpaceBugEnemy(adultType, egg.x + rand(-8, 8), egg.y + rand(-8, 8), { juvenile: true });
      ufos.push(hatchling);
    }

    function updateSpaceBugEnemy(u, dt) {
      if (u.hitFlash > 0) u.hitFlash = Math.max(0, u.hitFlash - dt);
      if (u.scale < 1) u.scale = Math.min(1, u.scale + dt * 2.4);
      // Mayo slow timer (separate from freeze)
      if (u.mayoTimer > 0) {
        u.mayoTimer -= dt;
        if ((u.mayoCorrosiveDps || 0) > 0) applyDamageToUfo(u, u.mayoCorrosiveDps * dt);
        if (u.mayoTimer <= 0) { u.mayoTimer = 0; u.mayoCorrosiveDps = 0; u.mayoCovered = false; u.mayoColor1 = null; }
      }
      if (u.frozen && u.type !== 'egg') {
        u.frozenTimer -= dt;
        if (u.frozenDps > 0) applyDamageToUfo(u, u.frozenDps * dt);
        if (u.frozenTimer <= 0) { u.frozen = false; u.frozenTimer = 0; u.frozenDps = 0; }
        return;
      }

      if (u.type === 'egg') {
        if (!u.hatched) {
          u.hatchTimer -= dt;
          if (u.hatchTimer <= 1) u.frame = 1;
          if (u.hatchTimer <= 0) {
            u.frame = 2;
            u.hatched = true;
            hatchEgg(u);
            u.postHatchTimer = Math.max(0.1, Number(u.postHatchTimerDuration) || 0.7);
          }
        } else {
          u.frame = 2;
          u.postHatchTimer -= dt;
          const pulse = 1 + Math.sin(performance.now() * 0.02) * 0.12;
          u.scale = Math.max(0.2, pulse);
          if (u.postHatchTimer <= 0) u.dead = true;
        }
        return;
      }

      if (u.isJuvenile) {
        u.growthTimer += dt;
        const growthDuration = Math.max(0.2, Number(u.growthDuration) || 3);
        const g = clamp01(u.growthTimer / growthDuration);
        u.scale = lerp(0.45, 1, g);
        if (g >= 1) {
          u.isJuvenile = false;
          const hpRatio = clamp01(u.hp / Math.max(1, u.maxHp));
          u.maxHp = u.adultType === 'mother_bug' ? 5 : 2;
          u.hp = Math.max(1, Math.round(u.maxHp * hpRatio));
          u.speed = Number.isFinite(u.adultSpeed) ? u.adultSpeed : u.speed;
          if (u.adultType === 'mother_bug') u.canLayEgg = true;
        }
      }

      u.wanderTimer -= dt;
      if (u.wanderTimer <= 0) {
        u.wanderTimer = rand(0.22, 0.64);
        u.wanderTarget = rand(-0.9, 0.9);
      }
      u.wanderOffset = lerp(u.wanderOffset, u.wanderTarget, dt * 3.4);
      u.wanderPhase += dt * (3.2 + u.speed * 0.9);
      const bugWobble = Math.sin(u.wanderPhase) * 0.34 + u.wanderOffset * 0.28;
      const a = angleTo(u.x, u.y, CX, CY) + bugWobble;
      u.moveAngle = a;
      if (!u.frozen) {
        const slowFactor = u.mayoTimer > 0 ? 0.3 : 1.0;
        u.x += Math.cos(a) * u.speed * u.scale * slowFactor;
        u.y += Math.sin(a) * u.speed * u.scale * slowFactor;
      }

      u.frameTick += dt;
      if (u.frameTick > 0.11) {
        u.frameTick = 0;
        u.frame = (u.frame + 1) % 4;
      }

      if (u.type === 'mother_bug' && u.canLayEgg) {
        u.eggTimer -= dt;
        if (u.eggTimer <= 0) {
          u.eggTimer = Math.max(0.2, Number(u.eggSpawnInterval) || 2);
          spawnEggFromMother(u);
        }
      }

      if (dist(u.x, u.y, CX, CY) < Math.max(32, u.size * 0.46)) {
        applyDamageToUfo(u, 9999);
        hitSkipButton();
      }

      if (shipAlive && shipImmunityTimer <= 0) {
        const sp = getShipPos();
        if (dist(u.x, u.y, sp.x, sp.y) < (u.size * 0.45 + SHIP_SIZE * SHIP_HITBOX_SCALE) * u.scale) {
          applyDamageToUfo(u, 9999);
          handleShipCollisionDamage(sp.x, sp.y);
        }
      }
    }

    function updateClassicUfoEnemy(u, dt) {
      if (u.hitFlash > 0) u.hitFlash = Math.max(0, u.hitFlash - dt);
      if (u.scale < 1) u.scale = Math.min(1, u.scale + dt * 2.8);
      // Mayo slow timer (separate from freeze)
      if (u.mayoTimer > 0) {
        u.mayoTimer -= dt;
        if ((u.mayoCorrosiveDps || 0) > 0) applyDamageToUfo(u, u.mayoCorrosiveDps * dt);
        if (u.mayoTimer <= 0) { u.mayoTimer = 0; u.mayoCorrosiveDps = 0; u.mayoCovered = false; u.mayoColor1 = null; }
      }
      if (u.frozen) {
        u.frozenTimer -= dt;
        if (u.frozenDps > 0) applyDamageToUfo(u, u.frozenDps * dt);
        if (u.frozenTimer <= 0) { u.frozen = false; u.frozenTimer = 0; u.frozenDps = 0; }
        return;
      }

      if (u.isKota) {
        if (u.kotaBeamTimer > 0) {
          u.kotaBeamTimer = Math.max(0, u.kotaBeamTimer - dt);
          if (u.kotaDropUfo) {
            u.kotaDropUfo.frameTick += dt;
            if (u.kotaDropUfo.frameTick > 0.11) { u.kotaDropUfo.frameTick = 0; u.kotaDropUfo.frame = (u.kotaDropUfo.frame + 1) % 3; }
          }
          if (u.kotaBeamTimer <= 0 && u.kotaDropVariant) {
            const dropped = createUfoEnemyFromVariant(u.kotaDropVariant, u.kotaDropX, u.kotaDropEndY, { scale: 0.82 });
            ufos.push(dropped);
            u.kotaDropVariant = null;
            u.kotaDropUfo = null;
          }
        } else {
          u.kotaStopTimer -= dt;
          if (u.kotaStopTimer <= 0) {
            u.kotaStopTimer = rand(3, 6);
            const elite = getUfoVariantById('elite_ufo') || findVariantByName('elite') || pickWeightedVariant();
            u.kotaDropVariant = elite || null;
            u.kotaDropUfo = elite ? { frame: 0, frameTick: 0, variant: elite } : null;
            u.kotaDropX = u.x;
            u.kotaDropStartY = u.y + u.size * 0.1;
            u.kotaDropEndY = u.y + u.size * 1.1;
            u.kotaBeamDur = 1.5;
            u.kotaBeamTimer = 1.5;
            playSound(audioConfig.events && audioConfig.events.ufoRay);
          }
        }
      }

      if (u.formationRole === 'follower' && u.formationLeader) {
        if (u.formationLeader.dead) {
          // Leader died -- become independent
          u.formationRole  = null;
          u.formationLeader = null;
          const a = angleTo(u.x, u.y, CX, CY);
          const _sf0 = u.mayoTimer > 0 ? 0.3 : 1.0;
          u.x += Math.cos(a) * u.speed * u.scale * _sf0;
          u.y += Math.sin(a) * u.speed * u.scale * _sf0;
        } else if (u.formationIsBossMinion) {
          // Orbit the boss leader
          u.formationOrbitAngle += (formationConfig.boss?.orbitSpeed || 0.9) * dt;
          u.x = u.formationLeader.x + Math.cos(u.formationOrbitAngle) * u.formationOrbitRadius;
          u.y = u.formationLeader.y + Math.sin(u.formationOrbitAngle) * u.formationOrbitRadius;
        } else {
          // Line or V: compute dynamic target behind the leader
          const ldr = u.formationLeader;
          const la  = angleTo(ldr.x, ldr.y, CX, CY);
          const pa  = la + Math.PI / 2;
          let targetX, targetY;
          if (u.formationPairNum !== undefined) {
            // V formation
            const cfg = formationConfig.v || {};
            const spacing = ldr.size * (cfg.spacingMult || 0.85);
            const spread  = ldr.size * (cfg.spreadMult || 0.65);
            targetX = ldr.x - Math.cos(la) * spacing * u.formationPairNum + Math.cos(pa) * spread * u.formationSide;
            targetY = ldr.y - Math.sin(la) * spacing * u.formationPairNum + Math.sin(pa) * spread * u.formationSide;
          } else {
            // Line formation
            const cfg = formationConfig.line || {};
            const spacing = ldr.size * (cfg.spacingMult || 0.9);
            targetX = ldr.x - Math.cos(la) * spacing * u.formationIndex;
            targetY = ldr.y - Math.sin(la) * spacing * u.formationIndex;
          }
          const ta = angleTo(u.x, u.y, targetX, targetY);
          const _sf1 = u.mayoTimer > 0 ? 0.3 : 1.0;
          u.x += Math.cos(ta) * u.speed * u.scale * _sf1;
          u.y += Math.sin(ta) * u.speed * u.scale * _sf1;
        }
      } else if (!u.isKota || u.kotaBeamTimer <= 0) {
        const a = angleTo(u.x, u.y, CX, CY);
        const _sf2 = u.mayoTimer > 0 ? 0.3 : 1.0;
        u.x += Math.cos(a) * u.speed * u.scale * _sf2;
        u.y += Math.sin(a) * u.speed * u.scale * _sf2;
      }

      u.frameTick += dt;
      if (u.frameTick > 0.11) {
        u.frameTick = 0;
        u.frame = (u.frame + 1) % 3;
      }

      if (dist(u.x, u.y, CX, CY) < Math.max(32, u.size * 0.46)) {
        applyDamageToUfo(u, 9999);
        hitSkipButton();
      }

      if (shipAlive && shipImmunityTimer <= 0) {
        const sp = getShipPos();
        if (dist(u.x, u.y, sp.x, sp.y) < (u.size * 0.45 + SHIP_SIZE * SHIP_HITBOX_SCALE) * u.scale) {
          applyDamageToUfo(u, 9999);
          handleShipCollisionDamage(sp.x, sp.y);
        }
      }
    }

    function createUfoEnemyFromVariant(variant, x, y, opts) {
      const o = opts || {};
      const safeVariant = variant || {};
      const stats = (safeVariant && safeVariant.stats && typeof safeVariant.stats === 'object') ? safeVariant.stats : {};
      const vName = String(safeVariant && safeVariant.name ? safeVariant.name : '').toLowerCase();
      const isKota = vName.includes('kota');
      return {
        id: nextUfoId++,
        x, y,
        type: 'ufo',
        frame: 0,
        frameTick: 0,
        scale: Number.isFinite(Number(o.scale)) ? Number(o.scale) : 0,
        dead: false,
        hp: Math.max(1, Number.isFinite(Number(stats.hp)) ? Number(stats.hp) : 1),
        maxHp: Math.max(1, Number.isFinite(Number(stats.hp)) ? Number(stats.hp) : 1),
        hitFlash: 0,
        crackSeed: Math.random() * Math.PI * 2,
        speed: Number.isFinite(Number(stats.speed)) ? Number(stats.speed) : UFO_SPEED,
        size: Math.max(12, Number.isFinite(Number(stats.size)) ? Number(stats.size) : UFO_SIZE),
        score: Math.max(0, Number.isFinite(Number(stats.score)) ? Number(stats.score) : 100),
        variant: safeVariant,
        isKota,
        kotaStopTimer: isKota ? rand(3, 6) : 0,
        kotaBeamTimer: 0
      };
    }

    function resolveVariantByKind(kind) {
      let v = getUfoVariantById(kind);
      if (!v && kind === 'UFO_mothership')  v = findVariantByName('mothership') || findVariantByName('UFO_mothership');
      if (!v && kind === 'heavy_ufo') v = findVariantByName('heavy');
      if (!v && kind === 'elite_ufo') v = findVariantByName('elite');
      if (!v) v = getUfoVariantById('ufo') || findVariantByName('ufo') || pickWeightedVariant();
      return v || (ufoVariants && ufoVariants[0]) || null;
    }

    function spawnFormation(formationType, baseX, baseY) {
      const formationId = nextFormationId++;
      const memberDefs  = [];
      let speedMult = 1.0;
      let isBoss    = false;
      const levelPool = Array.isArray(getLevelEnemyPool(currentLevel)) ? getLevelEnemyPool(currentLevel) : [];

      if (formationType === 'line') {
        const pool = levelPool.filter(e => e && e.type !== 'UFO_mothership' && e.type !== 'bug' && e.type !== 'mother_bug');
        const pick = pickWeightedOption(pool.length ? pool : levelPool);
        const kind = pick ? pick.type : 'ufo';
        if (kind === 'bug' || kind === 'mother_bug') return false;
        const variant = resolveVariantByKind(kind);
        if (!variant) return false;
        const cfg = formationConfig.line || {};
        const count = Math.round(rand(cfg.countMin || 5, cfg.countMax || 10));
        for (let i = 0; i < count; i++) memberDefs.push({ variant, formationIndex: i });
        speedMult = cfg.speedBonus || 1.2;

      } else if (formationType === 'v') {
        const pool = levelPool.filter(e => e && e.type !== 'UFO_mothership' && e.type !== 'bug' && e.type !== 'mother_bug');
        const pick = pickWeightedOption(pool.length ? pool : levelPool);
        const kind = pick ? pick.type : 'ufo';
        if (kind === 'bug' || kind === 'mother_bug') return false;
        const variant = resolveVariantByKind(kind);
        if (!variant) return false;
        const cfg = formationConfig.v || {};
        const totals = Array.isArray(cfg.sizeOptions) ? cfg.sizeOptions : [5, 7, 9, 11];
        const total  = totals[Math.floor(Math.random() * totals.length)];
        memberDefs.push({ variant, formationIndex: 0, formationPairNum: 0, formationSide: 0 });
        let pairNum = 1;
        for (let i = 1; i < total; i += 2) {
          memberDefs.push({ variant, formationIndex: i,   formationPairNum: pairNum, formationSide:  pairNum });
          memberDefs.push({ variant, formationIndex: i+1, formationPairNum: pairNum, formationSide: -pairNum });
          pairNum++;
        }
        speedMult = cfg.speedBonus || 1.2;

      } else if (formationType === 'boss') {
        const lvlTypes = levelPool.map(e => e && e.type).filter(Boolean);
        const hasKota  = lvlTypes.includes('UFO_mothership')  && !!(getUfoVariantById('UFO_mothership')  || findVariantByName('mothership'));
        const hasElite = lvlTypes.includes('elite_ufo') && !!(getUfoVariantById('elite_ufo') || findVariantByName('elite'));
        const hasHeavy = lvlTypes.includes('heavy_ufo') && !!(getUfoVariantById('heavy_ufo') || findVariantByName('heavy'));
        let bossVariant, minionVariant;
        if (hasKota && hasElite && Math.random() < 0.5) {
          bossVariant   = getUfoVariantById('UFO_mothership')  || findVariantByName('mothership');
          minionVariant = getUfoVariantById('elite_ufo') || findVariantByName('elite');
        } else if (hasElite && hasHeavy) {
          bossVariant   = getUfoVariantById('elite_ufo') || findVariantByName('elite');
          minionVariant = getUfoVariantById('heavy_ufo') || findVariantByName('heavy');
        } else {
          return false;
        }
        if (!bossVariant || !minionVariant) return false;
        memberDefs.push({ variant: bossVariant, formationIndex: 0 });
        for (let i = 0; i < 6; i++) {
          memberDefs.push({ variant: minionVariant, formationIndex: i + 1,
            formationOrbitAngle: (Math.PI * 2 / 6) * i, formationIsBossMinion: true });
        }
        isBoss = true;

      } else {
        return false;
      }

      // Build entities
      const entities = [];
      let leader = null;
      for (const m of memberDefs) {
        const ent = createUfoEnemyFromVariant(m.variant, baseX, baseY);
        ent.formationId    = formationId;
        ent.formationIndex = m.formationIndex;
        if (m.formationIndex === 0 && !m.formationIsBossMinion) {
          ent.formationRole = 'leader';
          leader = ent;
        } else {
          ent.formationRole = 'follower';
          if (m.formationIsBossMinion) {
            ent.formationIsBossMinion = true;
            ent.formationOrbitAngle   = m.formationOrbitAngle;
          } else if (formationType === 'v') {
            ent.formationPairNum = m.formationPairNum;
            ent.formationSide    = m.formationSide;
          }
        }
        entities.push(ent);
      }
      if (!leader) return false;

      // Apply speed
      if (isBoss) {
        const maxSpeed = Math.max(...entities.map(e => e.speed));
        for (const e of entities) e.speed = maxSpeed;
      } else {
        for (const e of entities) e.speed *= speedMult;
      }

      // Link followers and compute orbit radius
      const angle    = angleTo(baseX, baseY, CX, CY);
      const perpAngle = angle + Math.PI / 2;
      for (const e of entities) {
        if (e.formationRole === 'follower') {
          e.formationLeader = leader;
          if (e.formationIsBossMinion) {
            e.formationOrbitRadius = leader.size * (formationConfig.boss?.orbitRadiusMult || 0.6) + e.size * 0.6;
          }
        }
      }

      // Set initial positions
      if (formationType === 'line') {
        const cfg = formationConfig.line || {};
        const spacing = memberDefs[0].variant.stats.size * (cfg.spacingMult || 0.9);
        for (const e of entities) {
          e.x = baseX - Math.cos(angle) * spacing * e.formationIndex;
          e.y = baseY - Math.sin(angle) * spacing * e.formationIndex;
        }
      } else if (formationType === 'v') {
        const cfg = formationConfig.v || {};
        const spacing = memberDefs[0].variant.stats.size * (cfg.spacingMult || 0.85);
        const spread  = memberDefs[0].variant.stats.size * (cfg.spreadMult || 0.65);
        for (const e of entities) {
          if (e.formationRole === 'leader') continue;
          e.x = baseX - Math.cos(angle)    * spacing * e.formationPairNum
                      + Math.cos(perpAngle) * spread  * e.formationSide;
          e.y = baseY - Math.sin(angle)    * spacing * e.formationPairNum
                      + Math.sin(perpAngle) * spread  * e.formationSide;
        }
      } else if (formationType === 'boss') {
        for (const e of entities) {
          if (e.formationRole === 'leader') continue;
          e.x = baseX + Math.cos(e.formationOrbitAngle) * e.formationOrbitRadius;
          e.y = baseY + Math.sin(e.formationOrbitAngle) * e.formationOrbitRadius;
        }
      }

      for (const e of entities) ufos.push(e);
      return true;
    }

    function spawnUFO() {
      const edge = Math.floor(Math.random()*4);
      let x, y;
      if      (edge===0){ x=rand(0,W); y=-30; }
      else if (edge===1){ x=rand(0,W); y=H+30; }
      else if (edge===2){ x=-30; y=rand(0,H); }
      else              { x=W+30; y=rand(0,H); }

      try {
        const pool = Array.isArray(getLevelEnemyPool(currentLevel)) ? getLevelEnemyPool(currentLevel) : [{ type: 'ufo', weight: 100 }];

        // ~50% chance to spawn a formation instead of a solo UFO
        if (Math.random() < getCurrentFormationSpawnRate()) {
          const r = Math.random();
          const fType = r < 0.35 ? 'line' : r < 0.70 ? 'v' : 'boss';
          if (spawnFormation(fType, x, y)) return;
        }

        // 1% chance to spawn a scout_ufo on any level
        if (Math.random() < 0.01) {
          const scoutVariant = getUfoVariantById('scout_ufo') || findVariantByName('scout');
          if (scoutVariant) {
            ufos.push(createUfoEnemyFromVariant(scoutVariant, x, y));
            return;
          }
        }

        const pick = pickWeightedOption(pool);
        const kind = pick ? pick.type : 'ufo';

        if (kind === 'bug' || kind === 'mother_bug') {
          ufos.push(createSpaceBugEnemy(kind, x, y));
          return;
        }

        let variant = getUfoVariantById(kind);
        if (!variant && kind === 'UFO_mothership') variant = findVariantByName('mothership') || findVariantByName('UFO_mothership');
        if (!variant && kind === 'heavy_ufo') variant = findVariantByName('heavy');
        if (!variant && kind === 'elite_ufo') variant = findVariantByName('elite');
        if (!variant) variant = getUfoVariantById('ufo') || findVariantByName('ufo') || pickWeightedVariant();

        variant = variant || pickWeightedVariant() || ufoVariants[0];
        if (!variant) {
          ufos.push(createSpaceBugEnemy('bug', x, y));
          return;
        }

        ufos.push(createUfoEnemyFromVariant(variant, x, y));
      } catch (_e) {
        ufos.push(createSpaceBugEnemy('bug', x, y));
      }
    }

    function spawnExplosion(x,y) {
      playSound(audioConfig.events && audioConfig.events.explosion);
      for (let i=0;i<32;i++){
        const a=rand(0,Math.PI*2), spd=rand(0.75,3);
        particles.push({ x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
          r:rand(1,3.5), life:1, decay:rand(0.018,0.040),
          color:'hsl('+rand(10,50)+',100%,'+rand(50,80)+'%)' });
      }
      particles.push({ x,y, ring:true, r:2, life:1, decay:0.030 });
    }

    function spawnShipDeathExplosion(x, y) {
      playSound(audioConfig.events && audioConfig.events.explosion);
      const sdLevel = Math.max(1, Number(shipUpgradeLevels.selfDestruct) || 1);
      const sdCfg = getShipSysLevel('selfDestruct', sdLevel);
      const sdRadiusMult = Number.isFinite(Number(sdCfg.radiusMult)) ? Number(sdCfg.radiusMult) : (sdLevel >= 3 ? 1.0 : sdLevel >= 2 ? 0.75 : 0.5);
      const baseBlast = Number(shipSystemsConfig.selfDestruct.baseBlastRadius) || 350;
      const blastRadius = baseBlast * sdRadiusMult;
      const particleScale = blastRadius / 350;
      // Large explosion with many particles
      for (let i = 0; i < Math.max(40, Math.round(120 * particleScale)); i++) {
        const a = rand(0, Math.PI * 2);
        const spd = rand(2, 10 * particleScale);
        particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
          r: rand(3, 12) * (0.7 + particleScale * 0.3), life: 1, decay: rand(0.008, 0.018),
          color: 'hsl(' + rand(0, 60) + ',100%,' + rand(40, 85) + '%)' });
      }
      // Large shockwave rings
      particles.push({ x, y, ring: true, r: 8 * sdRadiusMult, life: 1, decay: 0.020 });
      particles.push({ x, y, ring: true, r: 12 * sdRadiusMult, life: 0.8, decay: 0.015 });
      
      // Damage all nearby enemies and deduct cash
      for (const u of ufos) {
        if (!u.dead && dist(u.x, u.y, x, y) < blastRadius) {
          applyDamageToUfo(u, 9999); // Kill the enemy
        }
      }
      cash = Math.max(0, cash - 1000);
      updateCashCounter();
    }

    function spawnGooSplat(x, y, scale) {
      playSound(audioConfig.events && audioConfig.events.bugDeath);
      const s = Math.max(0.2, Number.isFinite(Number(scale)) ? Number(scale) : 1);
      const count = Math.max(8, Math.round(26 * s));
      const splatSizeScale = 0.5;
      for (let i = 0; i < count; i++) {
        const a = rand(0, Math.PI * 2);
        const spd = rand(1.0, 4.5) * s;
        particles.push({ x, y,
          vx: Math.cos(a) * spd * rand(1.1, 1.8),
          vy: Math.sin(a) * spd * rand(0.25, 0.55) + rand(-0.8, 0.3),
          r: rand(4, 10) * s * splatSizeScale, life: 1, decay: rand(0.010, 0.024),
          color: 'hsl(' + rand(90, 135) + ',100%,' + rand(28, 52) + '%)' });
      }
    }

    function spawnNukeExplosion(x, y, blastRadius) {
      const count = 64 + Math.floor(blastRadius * 0.28);
      for (let i = 0; i < count; i++) {
        const a = rand(0, Math.PI * 2);
        const spd = rand(2, blastRadius * 0.07);
        const hue = rand(20, 60);
        particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - rand(0, 2.5),
          r: rand(3, 12), life: 1, decay: rand(0.008, 0.022),
          color: 'hsl(' + hue + ',100%,' + rand(55, 85) + '%)' });
      }
      for (const [startR, decay] of [[6, 0.014], [10, 0.010], [4, 0.020]]) {
        particles.push({ x, y, ring: true, r: startR, life: 1, decay,
          nukeRing: true, maxR: blastRadius });
      }
    }

    function explodeSyringe(x, y, syringe) {
      const radius = syringe.blastRadius || 160;
      const color = syringe.color || 'rgba(100,200,255,0.72)';
      const freezeDur = syringe.freezeDuration || 5;
      const freezeDps = syringe.freezeDps || 0;
      for (let i = 0; i < 28; i++) {
        const a = rand(0, Math.PI * 2), spd = rand(1.0, 3.5);
        particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
          r: rand(3, 8), life: 1, decay: rand(0.012, 0.030),
          color: freezeDps > 0 ? 'hsl(' + rand(155, 185) + ',90%,55%)' : 'hsl(' + rand(190, 220) + ',90%,65%)'
        });
      }
      for (let i = 0; i < 28; i++) {
        const a = rand(0, Math.PI * 2), spd = rand(1.0, 3.5);
        particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
          r: rand(3, 8), life: 1, decay: rand(0.012, 0.030),
          color: freezeDps > 0 ? 'hsl(' + rand(155, 185) + ',90%,55%)' : 'hsl(' + rand(190, 220) + ',90%,65%)'
        });
      }
      particles.push({ x, y, ring: true, r: 5, life: 1, decay: 0.016, freezeRing: true, freezeColor: color });
      let splatted = false;
      for (const u of ufos) {
        if (u.dead) continue;
        if (dist(x, y, u.x, u.y) <= radius) {
          const wasFrozen = !!u.frozen;
          u.frozen = true;
          u.frozenTimer = freezeDur;
          u.frozenDps = freezeDps;
          if (!wasFrozen) splatted = true;
        }
      }
      if (splatted) playSound(audioConfig.events && audioConfig.events.coat);
    }

    function spawnFragments(x, y, img, drawSize) {
      const sz=drawSize||UFO_SIZE, cols=2, rows=2;
      const iw=img.naturalWidth||img.width||sz, ih=img.naturalHeight||img.height||sz;
      const pw=iw/cols, ph=ih/rows, dw=sz/cols, dh=sz/rows;
      for(let row=0;row<rows;row++) for(let col=0;col<cols;col++){
        const a=rand(0,Math.PI*2), spd=rand(2,5.5);
        fragments.push({ img, sx:col*pw, sy:row*ph, sw:pw, sh:ph, dw, dh,
          x:x+(col-0.5)*dw, y:y+(row-0.5)*dh,
          vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-1,
          rot:rand(-0.15,0.15), angle:rand(0,Math.PI*2),
          life:1, decay:rand(0.016,0.028) });
      }
    }

    // === Intro UFO frame tick =============================================
    function tickIntroUFO(dt) {
      iUFO.frameTick += dt;
      if (iUFO.frameTick > 0.11) { iUFO.frameTick=0; iUFO.frame=(iUFO.frame+1)%3; }
    }

    // === Main loop ============================================================
    let lastTime = 0;
    function update(ts) {
      const dt = Math.min((ts - lastTime)/1000, 0.05);
      lastTime = ts;
      phaseT += dt;

      // == INTRO phases ========================================================
      if (phase === 'idle') {
        // nothing to update; DOM button handles click
      }

      else if (phase === 'fade_in') {
        // fade space bg in over 1.2s
        spaceFade = clamp01(phaseT / 1.2);
        // add skip counter to DOM button text (already hidden) - noop
        if (phaseT >= 1.2) setPhase('ufo_enter');
      }

      else if (phase === 'ufo_enter') {
        // UFO flies from right to hover position above idle button (BTN_IDLE_X, BTN_IDLE_Y - 90)
        const TARGET_X = BTN_IDLE_X, TARGET_Y = BTN_IDLE_Y - 100;
        const DUR = 1.6;
        const p = clamp01(phaseT / DUR);
        const ep = easeOut(p);
        iUFO.x = lerp(W + 80, TARGET_X, ep);
        iUFO.y = lerp(H - 80, TARGET_Y, ep);
        tickIntroUFO(dt);
        if (phaseT >= DUR) {
          iUFO.x = TARGET_X; iUFO.y = TARGET_Y;
          setPhase('ufo_hover');
        }
      }

      else if (phase === 'ufo_hover') {
        // slight hover bob + beam fades in
        tickIntroUFO(dt);
        iUFO.y = (BTN_IDLE_Y - 100) + Math.sin(phaseT * 2.5) * 4;
        beamAlpha = clamp01(phaseT / 0.8);
        if (phaseT >= 1.5) {
          beamAlpha = 1;
          setPhase('btn_lift');
        }
      }

      else if (phase === 'btn_lift') {
        // button rises from BTN_IDLE_Y up into UFO body over 1.2s
        const DUR = 1.2;
        const p = clamp01(phaseT / DUR);
        const ep = easeInOut(p);
        iBTN.x = BTN_IDLE_X;
        iBTN.y = lerp(BTN_IDLE_Y, iUFO.y + INTRO_BTN_OFFSET, ep);
        tickIntroUFO(dt);
        iUFO.y = (BTN_IDLE_Y - 100) + Math.sin(phaseT * 2.5) * 4;
        if (phaseT >= DUR) {
          iBTN.y = iUFO.y + INTRO_BTN_OFFSET;
          setPhase('ufo_carry');
        }
      }

      else if (phase === 'ufo_carry') {
        // UFO + button travel from BTN_IDLE area to center.
        const DUR = 1.8;
        const p = clamp01(phaseT / DUR);
        const ep = easeInOut(p);
        iUFO.x = lerp(BTN_IDLE_X, CX, ep);
        iUFO.y = lerp(BTN_IDLE_Y - 100, INTRO_UFO_CENTER_Y, ep);
        iBTN.x = iUFO.x;
        // Keep the button locked near the beam origin while being carried.
        iBTN.y = iUFO.y + INTRO_BTN_OFFSET;
        tickIntroUFO(dt);
        if (phaseT >= DUR) {
          iUFO.x = CX; iUFO.y = INTRO_UFO_CENTER_Y;
          iBTN.x = iUFO.x; iBTN.y = iUFO.y + INTRO_BTN_OFFSET;
          beamAlpha = 1;
          setPhase('shoot');
        }
      }

      else if (phase === 'shoot') {
        // brief hover (0.5s), then bullet fires from right, travels to UFO
        tickIntroUFO(dt);
        iUFO.y = INTRO_UFO_CENTER_Y + Math.sin(phaseT * 2.5) * 4;
        iBTN.x = iUFO.x;
        iBTN.y = iUFO.y + INTRO_BTN_OFFSET;
        beamAlpha = 1;

        if (phaseT > 0.5 && !iBullet.alive) {
          // fire intro bullet from the same side as ship entrance (right)
          iBullet.alive = true;
          iBullet.x = W + 20;
          iBullet.y = iUFO.y;
          const a = angleTo(iBullet.x, iBullet.y, iUFO.x, iUFO.y);
          iBullet.vx = Math.cos(a) * 12;
          iBullet.vy = Math.sin(a) * 12;
        }
        if (iBullet.alive) {
          iBullet.x += iBullet.vx;
          iBullet.y += iBullet.vy;
          if (dist(iBullet.x, iBullet.y, iUFO.x, iUFO.y) < UFO_SIZE * 0.5) {
            iBullet.alive = false;
            beamAlpha = 0;
            spawnExplosion(iUFO.x, iUFO.y);
            spawnFragments(iUFO.x, iUFO.y, imgUFO[iUFO.frame], UFO_SIZE);
            // button drops to center
            iBTN.x = CX; iBTN.y = CY;
            setPhase('ship_enter');
          }
        }
      }

      else if (phase === 'ship_enter') {
        // Particles still playing; ship flies in from right toward orbit position
        const TARGET_ANGLE = -Math.PI / 2; // top of orbit
        const ORBIT_X = CX + Math.cos(TARGET_ANGLE) * ORBIT_RX;
        const ORBIT_Y = CY + Math.sin(TARGET_ANGLE) * ORBIT_RY;
        const DUR = 1.5;
        const p = clamp01(phaseT / DUR);
        const ep = easeOut(p);
        const prevX = iShip.x;
        const prevY = iShip.y;
        iShip.x = lerp(W + 100, ORBIT_X, ep);
        iShip.y = lerp(CY, ORBIT_Y, ep);
        // Keep nose aligned with motion during entry, then turn into orbit orientation.
        const moveA = angleTo(prevX, prevY, iShip.x, iShip.y);
        const flyRot = moveA + Math.PI / 2;
        const turnStart = 0.78;
        if (p < turnStart) {
          iShip.rot = flyRot;
        } else {
          const tp = clamp01((p - turnStart) / (1 - turnStart));
          const targetRot = TARGET_ANGLE + Math.PI / 2;
          iShip.rot = lerp(flyRot, targetRot, easeInOut(tp));
        }
        if (phaseT >= DUR) {
          // transition to game
          shipAngle = TARGET_ANGLE;
          setPhase('game');
          adActive = true;
          cash = 0;
          updateCashCounter();
          skipTimer = 240;
          skipReady = false;
          skipBtnHealth = 1.0;
          shipAlive = true;
          shipRespawnTimer = 0;
          shipImmunityTimer = 0;
          resetShipArmorHits();
          shipProtectionOwned = { eachAndEverything: false, wwwwtsactp: false, seraphSecure: false };
          eachProtection = { active: false, hitsLeft: 3, reloadTimer: 0, x: 0, y: 0 };
          wwwwProtection = { active: false, hitsLeft: 5, reloadTimer: 0, x: 0, y: 0, vx: 1.5, vy: 1.2, danceAngle: 0 };
          stopLoopSound('wwwwtsactp');
          seraphDome = { active: false, hitsLeft: 3, reloadTimer: 0, crackLevel: 0, visible: false };
          beginLevel(START_LEVEL);
          gameStartTime = performance.now() / 1000;
          startLoopSound('music', audioConfig.events && audioConfig.events.mainTheme);
          // show skip overlay div
          skipOverlay.style.display = 'block';
          cashCounter.style.display = 'block';
          upgradeBtn.style.display = 'block';
          renderUpgradeMenu();
        }
      }

      // == GAME phase ==========================================================
      else if (phase === 'game') {
        if (!gamePaused) {
          updateShip(dt);
          if (btnFlash > 0) btnFlash -= dt;
          if (upgradeBtnFlashTimer > 0) { upgradeBtnFlashTimer -= dt; updateCashCounter(); }

          // skip countdown
          if (!skipReady && levelActive) {
            skipTimer -= dt;
            if (skipTimer <= 0) {
              skipTimer = 0; skipReady = true;
              skipOverlay.style.cursor = 'pointer';
            }
          }

          if (levelIntroTimer > 0) levelIntroTimer = Math.max(0, levelIntroTimer - dt);

          if (levelActive) {
            if (!endlessMode || currentLevel !== 5) {
              levelTimeLeft = Math.max(0, levelTimeLeft - dt);
              if (levelTimeLeft <= 0) {
                levelActive = false;
              }
            }
          } else {
            advanceLevelIfCleared();
          }

          // ship respawn
          if (!shipAlive) {
            shipRespawnTimer -= dt;
            if (shipRespawnTimer <= 0) { shipAlive=true; shipImmunityTimer=3; resetShipArmorHits(); }
          }
          if (shipImmunityTimer > 0) shipImmunityTimer -= dt;

          if (levelActive) {
            ufoSpawnTimer -= dt;
          }
          if (levelActive && ufoSpawnTimer <= 0) {
            spawnUFO();
            ufoSpawnTimer = getCurrentLevelSpawnInterval();
          }

          for (const u of ufos) {
            if (u.dead) continue;
            if (u.type === 'bug' || u.type === 'mother_bug' || u.type === 'egg') {
              updateSpaceBugEnemy(u, dt);
            } else {
              updateClassicUfoEnemy(u, dt);
            }
          }

          // Run popup protection kills before projectile collision loops so dead enemies are skipped below.
          updateProtectionSystems(dt);

          const weapon = getCurrentWeapon();
          updateWeaponReloads(dt);
          fireTimer -= dt;
          if (!weapon || weapon.type !== 'electric') {
            clearElectricEffects();
          }
          if (weapon && weapon.type === 'electric') {
            stopLoopSound('flamethrower');
            flamethrowerFiring = false; flamethrowerData = null;
            updateElectricWeapon(dt);
          } else if (weapon && weapon.type === 'flamethrower') {
            updateFlamethrowerWeapon(dt);
          } else {
            stopAllContinuousSounds();
            flamethrowerFiring = false; flamethrowerData = null;
            const cd = weapon ? getEffectiveCooldown(weapon) : 0.5;
            if (fireHeld && shipAlive && fireTimer <= 0) {
              if (fireCurrentWeapon()) {
                fireTimer = cd;
              }
            }
          }

          // Update secondary (mayo continuous stream)
          const secWeapon = getCurrentRocketWeapon();
          if (secWeapon && secWeapon.type === 'mayo') {
            updateMayoWeapon(dt);
          } else {
            mayoFiring = false; mayoData = null;
          }

          for(const r of rockets){
            if(!r.alive) continue;
            r.x += r.vx;
            r.y += r.vy;
            const ta = Math.atan2(r.vy, r.vx);
            particles.push({
              x: r.x - Math.cos(ta) * 6,
              y: r.y - Math.sin(ta) * 6,
              vx: -Math.cos(ta) * 0.8 + rand(-0.3, 0.3),
              vy: -Math.sin(ta) * 0.8 + rand(-0.3, 0.3),
              r: rand(1.4, 3.0),
              life: 0.7,
              decay: rand(0.05, 0.08),
              color: 'hsl(' + rand(12, 42) + ',100%,' + rand(45, 75) + '%)'
            });

            for (const u of ufos) {
              if (u.dead || !r.alive) continue;
              if (dist(r.x, r.y, u.x, u.y) < u.size * 0.45 * u.scale + r.radius) {
                r.alive = false;
                explodeRocket(r.x, r.y, r);
              }
            }
            if (r.x < -40 || r.x > W + 40 || r.y < -40 || r.y > H + 40) r.alive = false;
          }

          for(const b of bullets){
            if(!b.alive) continue;
            b.px = b.x; b.py = b.y;
            b.x+=b.vx; b.y+=b.vy;
            if (b.spriteSpinSpeed) b.spriteRotation = (b.spriteRotation || 0) + b.spriteSpinSpeed;
            for(const u of ufos){
              if(u.dead||!b.alive) continue;
              if (b.hitIds && b.hitIds.has(u.id)) continue;
              if(dist(b.x,b.y,u.x,u.y)<u.size*0.5*u.scale + b.radius*0.35){
                if (b.hitIds) b.hitIds.add(u.id);
                b.hits += 1;
                applyDamageToUfo(u, b.damage || 1);
                if(!b.pierce || b.hits >= b.maxHits) b.alive=false;
              }
            }
            if(b.x<-30||b.x>W+30||b.y<-30||b.y>H+30) b.alive=false;
          }
          bullets=bullets.filter(b=>b.alive);
          rockets=rockets.filter(r=>r.alive);
          // Syringe update loop
          for (const s of syringes) {
            if (!s.alive) continue;
            s.x += s.vx; s.y += s.vy;
            // trail particles (light blue/green tint)
            const ta = Math.atan2(s.vy, s.vx);
            particles.push({ x: s.x - Math.cos(ta) * 6, y: s.y - Math.sin(ta) * 6,
              vx: -Math.cos(ta) * 0.5 + rand(-0.3, 0.3), vy: -Math.sin(ta) * 0.5 + rand(-0.3, 0.3),
              r: rand(1.0, 2.5), life: 0.55, decay: rand(0.04, 0.08),
              color: s.freezeDps > 0 ? 'hsl(' + rand(155, 175) + ',90%,58%)' : 'hsl(' + rand(190, 215) + ',90%,70%)' });
            for (const u of ufos) {
              if (u.dead || !s.alive) continue;
              if (dist(s.x, s.y, u.x, u.y) < u.size * 0.45 * u.scale + s.radius) {
                s.alive = false;
                explodeSyringe(s.x, s.y, s);
              }
            }
            if (s.x < -40 || s.x > W + 40 || s.y < -40 || s.y > H + 40) s.alive = false;
          }
          syringes = syringes.filter(s => s.alive);
          ufos=ufos.filter(u=>!u.dead);
        }
      }

      // == always update particles & fragments ================================
      for(const p of particles){
        if(!p.ring){ p.x+=p.vx; p.y+=p.vy; if(!p.noGravity) p.vy+=0.08; }
        else if(p.nukeRing){ p.r += (p.maxR || 240) * 0.025; }
        else { p.r+=3.5; }

        if (!p.ring && p.weaponHitType) {
          for (const u of ufos) {
            if (u.dead) continue;
            if (p.hitIds && p.hitIds.has(u.id)) continue;
            const hitR = u.size * 0.45 * u.scale + Math.max(1, p.r) * 0.35;
            if (dist(p.x, p.y, u.x, u.y) > hitR) continue;

            if (p.weaponHitType === 'flame') {
              const dmg = Number.isFinite(Number(p.hitDamage)) ? Number(p.hitDamage) : 0;
              if (dmg > 0) applyDamageToUfo(u, dmg);
            } else if (p.weaponHitType === 'mayo') {
              const wasCovered = !!u.mayoCovered;
              u.mayoCovered = true;
              u.mayoTimer = Math.max(u.mayoTimer || 0, Number(p.mayoSlowDur) || 4);
              u.mayoColor1 = p.mayoColor1 || '#f5f0a0';
              u.mayoColor2 = p.mayoColor2 || '#d4c830';
              const cdps = Number(p.mayoCorrosiveDps) || 0;
              if (cdps > 0) u.mayoCorrosiveDps = Math.max(u.mayoCorrosiveDps || 0, cdps);
              if (!wasCovered) playSound(audioConfig.events && audioConfig.events.coat);
            }

            if (p.hitIds) p.hitIds.add(u.id);
            const maxHits = Math.max(1, Number(p.maxHits) || 1);
            if (!p.hitIds || p.hitIds.size >= maxHits) {
              p.life = 0;
              break;
            }
          }
        }

        p.life-=p.decay;
      }
      particles=particles.filter(p=>p.life>0);
      for(const f of fragments){
        f.x+=f.vx; f.y+=f.vy; f.vy+=0.14;
        f.angle+=f.rot; f.life-=f.decay;
      }
      fragments=fragments.filter(f=>f.life>0);

      draw();
      requestAnimationFrame(update);
    }

    // === Draw =================================================================
    function draw() {
      ctx.clearRect(0, 0, W, H);
      const t = performance.now() / 1000;

      if (phase === 'idle') return; // canvas invisible, DOM shows over video

      // Space background with fade
      if (spaceFade > 0) {
        ctx.save();
        ctx.globalAlpha = spaceFade;
        ctx.fillStyle = '#03030f';
        ctx.fillRect(0, 0, W, H);
        const neb = ctx.createRadialGradient(CX,CY,20,CX,CY,340);
        neb.addColorStop(0,  'rgba(90,0,180,0.20)');
        neb.addColorStop(0.5,'rgba(0,20,90,0.12)');
        neb.addColorStop(1,  'rgba(0,0,0,0)');
        ctx.fillStyle = neb;
        ctx.fillRect(0, 0, W, H);
        for (const s of stars) {
          const alpha = s.a*(0.6+0.4*Math.sin(t*s.ts*60+s.to));
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.fillStyle='rgba(255,255,255,'+alpha+')';
          ctx.fill();
        }
        ctx.restore();
      }

      // == GAME phase drawing ==================================================
      if (phase === 'game') {
        if (btnFlash > 0) {
          ctx.save(); ctx.globalAlpha=(btnFlash/0.4)*0.35;
          ctx.fillStyle='#ff4444'; ctx.fillRect(0,0,W,H); ctx.restore();
        }

        drawParticlesFragments(t);
        drawProtectionSystemsBackground(t);
        drawGameUFOs();
        drawElectricBolts();
        drawRockets();
        drawGameShip(t);
        drawFlamethrowerEffect(t);
        drawMayoEffect(t);
        drawGameBullets();
        drawSyringes();
        drawSkipButton(t);
        drawProtectionSystems(t);
        if (levelIntroTimer > 0) {
          const p = clamp01(levelIntroTimer / 2.7);
          const alpha = Math.min(1, p * 1.1);
          ctx.save();
          ctx.globalAlpha = alpha;
          // Logo: show prominently, fade out as text appears
          if (currentLevel === 1 && imgLogo.complete && imgLogo.naturalWidth > 0) {
            const logoH = 200, logoW = logoH * (imgLogo.naturalWidth / imgLogo.naturalHeight);
            const logoAlpha = clamp01((levelIntroTimer - 0.6) / 1.2);
            ctx.globalAlpha = alpha * logoAlpha;
            ctx.shadowColor = 'rgba(110,190,255,0.6)';
            ctx.shadowBlur = 28;
            ctx.drawImage(imgLogo, CX - logoW / 2, CY - logoH / 2 - 30, logoW, logoH);
            ctx.globalAlpha = alpha * (1 - logoAlpha * 0.6);
            ctx.shadowBlur = 0;
          }
          ctx.globalAlpha = alpha;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = '900 28px sans-serif';
          ctx.fillStyle = 'rgba(240,247,255,0.92)';
          ctx.shadowColor = 'rgba(110,190,255,0.75)';
          ctx.shadowBlur = 18;
          ctx.fillText(levelIntroText || ('LEVEL ' + currentLevel), CX, CY - 90);
          ctx.restore();
        }
        drawWeaponAmmoPanel();
        if (gamePaused) {
          ctx.save();
          ctx.fillStyle = 'rgba(0,0,0,0.45)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = '#e8f1ff';
          ctx.font = '700 22px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('PAUSED', CX, 42);
          ctx.restore();
        }
        drawCrosshair(mouseX, mouseY);
        return;
      }

      // == INTRO drawing =======================================================
      drawParticlesFragments(t);

      // Tractor beam (phases: ufo_hover, btn_lift, ufo_carry, shoot)
      if ((phase==='ufo_hover'||phase==='btn_lift'||phase==='ufo_carry'||phase==='shoot') && beamAlpha>0) {
        const beamTop = iUFO.y + UFO_SIZE * 0.12;
        const beamBot = iBTN.y - 12;
        const bw = 28;
        ctx.save();
        ctx.globalAlpha = beamAlpha * (0.5 + 0.3 * Math.sin(t * 8));
        const bg = ctx.createLinearGradient(iUFO.x, beamTop, iUFO.x, beamBot);
        bg.addColorStop(0, 'rgba(160,255,200,0.85)');
        bg.addColorStop(1, 'rgba(80,200,255,0.10)');
        ctx.fillStyle = bg;
        ctx.beginPath();
        ctx.moveTo(iUFO.x - bw/2, beamTop);
        ctx.lineTo(iUFO.x + bw/2, beamTop);
        ctx.lineTo(iUFO.x + bw*1.6, beamBot);
        ctx.lineTo(iUFO.x - bw*1.6, beamBot);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      // Intro canvas skip button (all intro phases after idle)
      if (phase !== 'idle' && phase !== 'game') {
        drawIntroButton(iBTN.x, iBTN.y);
      }

      // Intro UFO
      if (phase==='ufo_enter'||phase==='ufo_hover'||phase==='btn_lift'||
          phase==='ufo_carry'||phase==='shoot') {
        ctx.save();
        ctx.translate(iUFO.x, iUFO.y);
        ctx.drawImage(imgUFO[iUFO.frame], -UFO_SIZE/2, -UFO_SIZE/2, UFO_SIZE, UFO_SIZE);
        ctx.restore();
      }

      // Intro bullet
      if (iBullet.alive) {
        ctx.save();
        ctx.shadowColor='#f80'; ctx.shadowBlur=14;
        ctx.beginPath(); ctx.arc(iBullet.x, iBullet.y, 4, 0, Math.PI*2);
        ctx.fillStyle='#ffa040'; ctx.fill();
        ctx.restore();
      }

      // Intro ship flying in
      if (phase === 'ship_enter') {
        ctx.save();
        ctx.translate(iShip.x, iShip.y);
        ctx.rotate(iShip.rot);
        drawShipLayers(ctx, -SHIP_SIZE/2, -SHIP_SIZE/2, SHIP_SIZE);
        ctx.restore();
      }

      // Cursor crosshair during intro (after fade starts)
      if (phase !== 'idle') drawCrosshair(mouseX, mouseY);
    }

    // === Shared draw helpers ==================================================
    function drawParticlesFragments(t) {
      for(const p of particles){
        ctx.save(); ctx.globalAlpha=p.life;
        if(p.ring){
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          if (p.gooRing) {
            ctx.strokeStyle = 'rgba(60,200,20,'+p.life+')'; ctx.lineWidth = 2;
          } else if (p.nukeRing) {
            ctx.strokeStyle = 'rgba(255,220,80,'+p.life+')'; ctx.lineWidth = 3;
          } else if (p.freezeRing) {
            const fc = (p.freezeColor || '').replace(/[\d.]+\)$/, p.life + ')');
            ctx.strokeStyle = fc || 'rgba(100,200,255,'+p.life+')'; ctx.lineWidth = 2.5;
          } else {
