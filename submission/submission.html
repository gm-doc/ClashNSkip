            ctx.strokeStyle='rgba(255,180,60,'+p.life+')'; ctx.lineWidth=2;
          }
          ctx.stroke();
        } else {
          ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,p.r*p.life),0,Math.PI*2);
          ctx.fillStyle=p.color; ctx.fill();
        }
        ctx.restore();
      }
      for(const f of fragments){
        ctx.save(); ctx.globalAlpha=f.life;
        ctx.translate(f.x,f.y); ctx.rotate(f.angle);
        ctx.drawImage(f.img,f.sx,f.sy,f.sw,f.sh,-f.dw/2,-f.dh/2,f.dw,f.dh);
        ctx.restore();
      }
    }

    function drawGameUFOs() {
      for(const u of ufos){
        const frameImg = getUfoFrameImage(u);
        if (u.isKota && u.kotaBeamTimer > 0) {
          // Compute drop progress to track the descending UFO
          const beamDur = u.kotaBeamDur || 1.5;
          const progress = (u.kotaDropStartY !== undefined) ? clamp01(1.0 - u.kotaBeamTimer / beamDur) : 0;
          const ep = 1 - Math.pow(1 - progress, 2);
          const dropY = (u.kotaDropStartY !== undefined) ? lerp(u.kotaDropStartY, u.kotaDropEndY, ep) : (u.y + u.size * 1.45);
          const dropScale = lerp(0.12, 0.85, ep);
          const dropSize = (u.kotaDropVariant ? (u.kotaDropVariant.stats.size || 82) : 82) * dropScale;
          // Beam top at UFO underside, beam bottom tracks the dropped UFO's current position
          const topY = u.y + u.size * 0.18;
          const botY = dropY + dropSize * 0.12;
          // Beam narrows at top (UFO underside width) and widens to match dropped item at bottom
          const bwTop = 14;
          const bwBot = Math.max(bwTop, dropSize * 0.5);
          ctx.save();
          const g = ctx.createLinearGradient(u.x, topY, u.x, botY);
          g.addColorStop(0, 'rgba(255,180,70,0.82)');
          g.addColorStop(1, 'rgba(255,120,40,0.12)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.moveTo(u.x - bwTop, topY);
          ctx.lineTo(u.x + bwTop, topY);
          ctx.lineTo(u.x + bwBot, botY);
          ctx.lineTo(u.x - bwBot, botY);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
          // Draw Elite UFO descending through beam (reverse of intro pickup)
          if (u.kotaDropUfo && u.kotaDropVariant) {
            const dropFrameImg = getUfoFrameImage(u.kotaDropUfo);
            ctx.save();
            ctx.globalAlpha = clamp01(progress * 4);
            ctx.translate(u.kotaDropX, dropY);
            ctx.drawImage(dropFrameImg, -dropSize / 2, -dropSize / 2, dropSize, dropSize);
            ctx.restore();
          }
        }
        ctx.save(); ctx.translate(u.x,u.y);
        if ((u.type === 'bug' || u.type === 'mother_bug') && Number.isFinite(u.moveAngle)) {
          ctx.rotate(u.moveAngle + Math.PI / 2);
        }
        ctx.scale(u.scale,u.scale);
        ctx.drawImage(frameImg,-u.size/2,-u.size/2,u.size,u.size);
        drawUfoCracks(u, frameImg);
        // Ice/Mayo overlay for frozen/mayo-covered enemies
        if (u.mayoCovered && u.mayoTimer > 0) {
          {
            // Mayo blob overlay clipped to sprite shape -- very opaque, enemy barely visible
            const overlaySize = Math.max(8, Math.round(u.size));
            if (!u.mayoCanvas || u.mayoCanvas.width !== overlaySize) {
              u.mayoCanvas = document.createElement('canvas');
              u.mayoCanvas.width = overlaySize;
              u.mayoCanvas.height = overlaySize;
            }
            const mayoCanvas = u.mayoCanvas;
            const mayoCtx = mayoCanvas.getContext('2d');
            const mc = overlaySize / 2;
            const oc1 = u.mayoColor1 || '#f5f0a0';
            const [mr, mg_, mb_] = hexToRgb(oc1);
            const mayoPulse = 0.88 + 0.07 * Math.sin(performance.now() * 0.003);
            mayoCtx.globalAlpha = Math.min(mayoPulse, 0.95);
            mayoCtx.fillStyle = `rgba(${mr},${mg_},${mb_},0.97)`;
            mayoCtx.fillRect(0, 0, overlaySize, overlaySize);
            // Highlight blob for dimension
            mayoCtx.globalAlpha = 0.45;
            mayoCtx.fillStyle = 'rgba(255,255,255,0.65)';
            mayoCtx.beginPath();
            mayoCtx.ellipse(mc * 0.7, mc * 0.65, overlaySize * 0.22, overlaySize * 0.18, -0.4, 0, Math.PI * 2);
            mayoCtx.fill();
            // Clip to visible sprite pixels
            mayoCtx.globalAlpha = 1;
            mayoCtx.globalCompositeOperation = 'destination-in';
            mayoCtx.drawImage(frameImg, 0, 0, overlaySize, overlaySize);
            mayoCtx.globalCompositeOperation = 'source-over';
            ctx.drawImage(mayoCanvas, -u.size / 2, -u.size / 2, u.size, u.size);
          }
        }
        // Ice overlay for frozen enemies (freeze gun / syringe)
        if (u.frozen && u.frozenTimer > 0) {
          const overlaySize = Math.max(8, Math.round(u.size));
          if (!u.iceCanvas || u.iceCanvas.width !== overlaySize) {
            u.iceCanvas = document.createElement('canvas');
            u.iceCanvas.width = overlaySize;
            u.iceCanvas.height = overlaySize;
          }
          const iceCanvas = u.iceCanvas;
          const iceCtx = iceCanvas.getContext('2d');
          const center = overlaySize / 2;
          const icePulse = 0.45 + 0.18 * Math.sin(performance.now() * 0.004);
          iceCtx.globalAlpha = Math.min(icePulse, u.frozenTimer * 0.5);
          iceCtx.fillStyle = u.frozenDps > 0 ? 'rgba(50,220,160,0.72)' : 'rgba(100,200,255,0.72)';
          iceCtx.beginPath();
          iceCtx.ellipse(center, center, overlaySize * 0.52, overlaySize * 0.52, 0, 0, Math.PI * 2);
          iceCtx.fill();
          iceCtx.globalAlpha = Math.min(0.7, u.frozenTimer * 0.5);
          iceCtx.strokeStyle = u.frozenDps > 0 ? 'rgba(180,255,230,0.9)' : 'rgba(200,240,255,0.9)';
          iceCtx.lineWidth = 1.5;
          for (let ci = 0; ci < 5; ci++) {
            const ca = (ci / 5) * Math.PI * 2;
            iceCtx.beginPath();
            iceCtx.moveTo(center, center);
            iceCtx.lineTo(center + Math.cos(ca) * overlaySize * 0.42, center + Math.sin(ca) * overlaySize * 0.42);
            iceCtx.stroke();
          }
          iceCtx.globalCompositeOperation = 'destination-in';
          iceCtx.drawImage(frameImg, 0, 0, overlaySize, overlaySize);
          iceCtx.globalCompositeOperation = 'source-over';
          ctx.drawImage(iceCanvas, -u.size/2, -u.size/2, u.size, u.size);
        }
        ctx.restore();
      }
    }

    function drawUfoCracks(u, frameImg) {
      if (!u.maxHp || u.maxHp <= 1) return;
      const damage = Math.max(0, u.maxHp - u.hp);
      if (damage <= 0) return;

      const progress = damage / u.maxHp;
      const crackCount = Math.max(2, Math.floor(progress * 12));
      const sizePx = Math.max(1, Math.round(u.size));
      const pulse = u.hitFlash > 0 ? (u.hitFlash / 0.16) : 0;

      if (!u.crackCanvas || u.crackCanvas.width !== sizePx || u.crackCanvas.height !== sizePx) {
        u.crackCanvas = document.createElement('canvas');
        u.crackCanvas.width = sizePx;
        u.crackCanvas.height = sizePx;
        u.crackDirty = true;
      }

      const cc = u.crackCanvas;
      if (u.crackDirty || pulse > 0) {
        const cctx = cc.getContext('2d');
        cctx.clearRect(0, 0, sizePx, sizePx);

        const cx = sizePx * 0.5;
        const cy = sizePx * 0.5;
        const baseR = sizePx * 0.42;

        // Draw thin random black fractures
        cctx.lineCap = 'round';
        cctx.lineJoin = 'round';
        cctx.strokeStyle = '#000000';
        cctx.lineWidth = Math.max(1, sizePx * 0.015);
        
        for (let i = 0; i < crackCount; i++) {
          // Pseudo-random angles and radii based on seed + index
          const seed = u.crackSeed + i * 73.5;
          const rand1 = Math.sin(seed) * 0.5 + 0.5;
          const rand2 = Math.sin(seed * 1.23) * 0.5 + 0.5;
          const rand3 = Math.sin(seed * 4.56) * 0.5 + 0.5;
          const rand4 = Math.sin(seed * 7.89) * 0.5 + 0.5;

          const a0 = rand1 * Math.PI * 2;
          const a1 = a0 + (rand2 - 0.5) * 1.5;
          const a2 = a1 + (rand3 - 0.5) * 1.8;

          const r0 = sizePx * (0.08 + rand4 * 0.08);
          const r1 = baseR * (0.30 + rand1 * 0.40);
          const r2 = Math.min(baseR, r1 + sizePx * (0.08 + rand2 * 0.16));

          const x0 = cx + Math.cos(a0) * r0;
          const y0 = cy + Math.sin(a0) * r0;
          const x1 = cx + Math.cos(a1) * r1;
          const y1 = cy + Math.sin(a1) * r1;
          const x2 = cx + Math.cos(a2) * r2;
          const y2 = cy + Math.sin(a2) * r2;

          cctx.beginPath();
          cctx.moveTo(x0, y0);
          cctx.lineTo(x1, y1);
          cctx.lineTo(x2, y2);
          cctx.stroke();
        }

        if (pulse > 0) {
          cctx.strokeStyle = 'rgba(255,245,220,0.95)';
          cctx.lineWidth = Math.max(1, sizePx * 0.02);
          cctx.beginPath();
          cctx.arc(cx, cy, sizePx * (0.15 + (1 - pulse) * 0.08), 0, Math.PI * 2);
          cctx.stroke();
        }

        // Mask cracks to visible UFO pixels only (no transparent-area artifacts).
        cctx.globalCompositeOperation = 'destination-in';
        cctx.drawImage(frameImg, 0, 0, sizePx, sizePx);
        cctx.globalCompositeOperation = 'source-over';
        if (!pulse) u.crackDirty = false;
      }

      ctx.save();
      ctx.globalAlpha = Math.min(1, 0.45 + progress * 0.65 + pulse * 0.25);
      ctx.drawImage(cc, -u.size * 0.5, -u.size * 0.5, u.size, u.size);
      ctx.restore();
    }

    function drawGameShip(t) {
      if (!shipAlive) return;
      const sp = getShipPos();
      const weapon = getCurrentWeapon();
      const weaponImg = weapon ? weaponImages[weapon.id] : null;
      const rocketWeapon = getCurrentRocketWeapon();
      const rocketImg = rocketWeapon ? weaponImages[rocketWeapon.id] : null;
      const rocketState = rocketWeapon ? getWeaponRuntimeState(rocketWeapon) : null;
      const rocketAttachedToShip = !!(rocketWeapon && rocketWeapon.rocketProjectileMode === 'smallest');
      ctx.save();
      if (shipImmunityTimer > 0) {
        ctx.globalAlpha = 0.55 + 0.30*Math.sin(t*18);
      }
      ctx.translate(sp.x,sp.y);
      ctx.rotate(shipAngle + Math.PI/2);
      if (!rocketAttachedToShip && getImageLikeSize(rocketImg)) {
        ctx.save();
        if (rocketState && rocketState.reloading) ctx.globalAlpha = 0.45;
        const loaded = (rocketState && Array.isArray(rocketState.rocketLoaded)) ? rocketState.rocketLoaded : [true, true];
        const leftLoaded = !!loaded[0], rightLoaded = !!loaded[1];
        if (leftLoaded && rightLoaded) {
          ctx.drawImage(rocketImg,-SHIP_SIZE/2,-SHIP_SIZE/2,SHIP_SIZE,SHIP_SIZE);
        } else if (leftLoaded || rightLoaded) {
          ctx.beginPath();
          if (leftLoaded) ctx.rect(-SHIP_SIZE/2, -SHIP_SIZE/2, SHIP_SIZE/2, SHIP_SIZE);
          if (rightLoaded) ctx.rect(0, -SHIP_SIZE/2, SHIP_SIZE/2, SHIP_SIZE);
          ctx.clip();
          ctx.drawImage(rocketImg,-SHIP_SIZE/2,-SHIP_SIZE/2,SHIP_SIZE,SHIP_SIZE);
        }
        ctx.restore();
        drawExtraMountedRocketPairs(ctx, rocketWeapon, rocketState, SHIP_SIZE);
      }
      if (rocketAttachedToShip && getImageLikeSize(rocketImg)) {
        ctx.drawImage(rocketImg,-SHIP_SIZE/2,-SHIP_SIZE/2,SHIP_SIZE,SHIP_SIZE);
      }
      drawShipLayers(ctx, -SHIP_SIZE/2, -SHIP_SIZE/2, SHIP_SIZE);
      if (getImageLikeSize(weaponImg)) {
        ctx.drawImage(weaponImg,-SHIP_SIZE/2,-SHIP_SIZE/2,SHIP_SIZE,SHIP_SIZE);
      }
      ctx.restore();
    }

    function drawGameBullets() {
      for(const b of bullets){
        ctx.save();
        const a = Math.atan2(b.vy, b.vx);
        if (b.spriteImage && getImageLikeSize(b.spriteImage)) {
          const sz = Math.max(8, b.radius * 2 * (Number(b.spriteSizeMult) || 1));
          ctx.translate(b.x, b.y);
          ctx.rotate(Number.isFinite(Number(b.spriteRotation)) ? Number(b.spriteRotation) : a);
          if (b.spriteHighlight) {
            const halo = ctx.createRadialGradient(0, 0, sz * 0.16, 0, 0, sz * 0.58);
            halo.addColorStop(0, 'rgba(170,220,255,0.28)');
            halo.addColorStop(1, 'rgba(70,140,255,0)');
            ctx.fillStyle = halo;
            ctx.beginPath();
            ctx.arc(0, 0, sz * 0.58, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
          ctx.drawImage(b.spriteImage, -sz * 0.5, -sz * 0.5, sz, sz);
        } else if (b.drawLength > 0) {
          const tx = b.x - Math.cos(a) * b.drawLength;
          const ty = b.y - Math.sin(a) * b.drawLength;
          ctx.strokeStyle = b.color;
          ctx.lineWidth = b.thickness;
          ctx.shadowColor = b.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.moveTo(b.x, b.y);
          ctx.lineTo(tx, ty);
          ctx.stroke();
        } else {
          ctx.shadowColor = b.color;
          ctx.shadowBlur = Math.max(6, b.radius * 2);
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
          ctx.fillStyle = b.color;
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawElectricBolts() {
      for (const bolt of electricBolts) {
        const segments = 8;
        ctx.save();
        ctx.strokeStyle = bolt.color;
        ctx.lineWidth = bolt.thickness;
        ctx.shadowColor = bolt.color;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(bolt.sx, bolt.sy);
        for (let i = 1; i < segments; i++) {
          const t = i / segments;
          const x = lerp(bolt.sx, bolt.tx, t);
          const y = lerp(bolt.sy, bolt.ty, t);
          const n = (Math.sin((performance.now() * 0.02) + i * 2.1) * 0.5 + 0.5);
          const jx = (n - 0.5) * 16;
          const jy = (0.5 - n) * 12;
          ctx.lineTo(x + jx, y + jy);
        }
        ctx.lineTo(bolt.tx, bolt.ty);
        ctx.stroke();
        ctx.restore();
      }
    }

    // === Draw a filled arc-cone with radial gradient ============================
    function drawGradientCone(sx, sy, angle, halfCone, range, innerRgba, outerRgba, globalAlpha) {
      ctx.save();
      ctx.globalAlpha = globalAlpha;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.arc(sx, sy, range, angle - halfCone, angle + halfCone);
      ctx.closePath();
      const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, range);
      grd.addColorStop(0,    innerRgba);
      grd.addColorStop(0.55, outerRgba);
      grd.addColorStop(1,    outerRgba.replace(/[\d.]+\)$/, '0)'));
      ctx.fillStyle = grd;
      ctx.fill();
      ctx.restore();
    }

    function drawFlamethrowerEffect(t) {
      if (!flamethrowerFiring || !flamethrowerData) return;
      const { muzzle, weapon } = flamethrowerData;
      const cfg = weapon.flamethrower || {};
      const c1 = cfg.color1 || '#ff6600';
      function cRgba(hex, a) { const [r, g, b] = hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }
      const pulse = 14 + 5 * Math.sin(t * 16);
      ctx.save();
      ctx.shadowColor = c1;
      ctx.shadowBlur = 30;
      const mg = ctx.createRadialGradient(muzzle.x, muzzle.y, 0, muzzle.x, muzzle.y, pulse);
      mg.addColorStop(0, cRgba('#ffffff', 0.95));
      mg.addColorStop(0.4, cRgba(c1, 0.8));
      mg.addColorStop(1, cRgba(c1, 0));
      ctx.globalAlpha = 0.85 + Math.sin(t * 14) * 0.1;
      ctx.fillStyle = mg;
      ctx.beginPath(); ctx.arc(muzzle.x, muzzle.y, pulse, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function drawMayoEffect(t) {
      if (!mayoFiring || !mayoData) return;
      const { muzzles, weapon } = mayoData;
      const cfg = weapon.mayo || {};
      const c1 = cfg.color1 || '#f5f0a0';
      function cRgba(hex, a) { const [r, g, b] = hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }
      ctx.save();
      ctx.shadowColor = c1;
      ctx.shadowBlur = 22;
      for (const m of muzzles) {
        const pulse = 12 + 4 * Math.sin(t * 11);
        const mg = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, pulse);
        mg.addColorStop(0, 'rgba(255,255,255,0.95)');
        mg.addColorStop(0.4, cRgba(c1, 0.85));
        mg.addColorStop(1, cRgba(c1, 0));
        ctx.globalAlpha = 0.8 + Math.sin(t * 11) * 0.1;
        ctx.fillStyle = mg;
        ctx.beginPath(); ctx.arc(m.x, m.y, pulse, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    function drawRockets() {
      for (const r of rockets) {
        ctx.save();
        const a = Math.atan2(r.vy, r.vx);
        ctx.translate(r.x, r.y);
        // Rocket sprite points upward in source art, so offset by +90deg to align with travel vector.
        ctx.rotate(a + Math.PI / 2);
        const parts = rocketPartImages[r.weaponId] || null;
        const part = (parts && parts[r.spriteSlot]) ? parts[r.spriteSlot] : null;
        if (part) {
          ctx.drawImage(part, -part.width * 0.5, -part.height * 0.5);
        } else {
          ctx.fillStyle = '#d6dde7';
          ctx.beginPath();
          ctx.moveTo(8, 0);
          ctx.lineTo(-6, -3.2);
          ctx.lineTo(-6, 3.2);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#ff6b2f';
          ctx.beginPath();
          ctx.moveTo(-6, 0);
          ctx.lineTo(-14 - Math.random() * 6, -2.2);
          ctx.lineTo(-14 - Math.random() * 6, 2.2);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawSyringes() {
      for (const s of syringes) {
        ctx.save();
        const a = Math.atan2(s.vy, s.vx);
        ctx.translate(s.x, s.y);
        ctx.rotate(a + Math.PI / 2);
        const parts = rocketPartImages[s.weaponId] || null;
        const part = (parts && parts[s.spriteSlot]) ? parts[s.spriteSlot] : null;
        if (part) {
          ctx.drawImage(part, -part.width * 0.5, -part.height * 0.5);
        } else {
          // Fallback: small needle shape
          ctx.fillStyle = s.freezeDps > 0 ? '#4de8b8' : '#70d8ff';
          ctx.fillRect(-1.5, -8, 3, 16);
          ctx.beginPath();
          ctx.moveTo(0, -10);
          ctx.lineTo(-2.5, -5);
          ctx.lineTo(2.5, -5);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawSkipButton(t) {
      // Draw skip button on canvas (center)
      const x = CX, y = CY;
      const w = 88, h = 28, r = 7;

      // determine color based on timer state
      let fillColor, emptyColor, borderColor, glowColor;
      if (skipReady) {
        fillColor='#27ae60'; emptyColor='#0d3a1e'; borderColor='#2ecc71'; glowColor='#2ecc71';
      } else {
        fillColor='#c0392b'; emptyColor='#3a0a0a'; borderColor='#e74c3c'; glowColor='#e74c3c';
      }

      const health = typeof skipBtnHealth !== 'undefined' ? Math.max(0, Math.min(1, skipBtnHealth)) : 1;

      ctx.save();
      // glow intensity increases when health is low
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = skipReady ? 18+8*Math.sin(t*6) : (10 + (1-health)*14);

      // Background (empty portion)
      ctx.beginPath();
      ctx.roundRect(x-w/2, y-h/2, w, h, r);
      ctx.fillStyle = emptyColor;
      ctx.fill();

      // Health fill (clipped to fill proportion)
      if (health > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(x-w/2, y-h/2, w, h, r);
        ctx.clip();
        ctx.fillStyle = fillColor;
        ctx.fillRect(x-w/2, y-h/2, w * health, h);
        ctx.restore();
      }

      // Border
      ctx.beginPath();
      ctx.roundRect(x-w/2, y-h/2, w, h, r);
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Label
      const secs = Math.ceil(skipTimer);
      const mm = String(Math.floor(secs/60)).padStart(2,'0');
      const ss = String(secs%60).padStart(2,'0');
      ctx.fillStyle = 'white';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(skipReady ? '\u23ED SKIP AD' : '\u23ED '+mm+':'+ss, x, y);
      if (!skipReady) {
        const ls = Math.ceil(levelTimeLeft);
        let levelLabel;
        if (endlessMode && currentLevel === 5) {
          levelLabel = levelActive ? ('ENDLESS - ' + ls + 's') : ('ENDLESS - CLEAR');
        } else {
          levelLabel = levelActive ? ('Level ' + currentLevel + ' - ' + ls + 's') : ('Level ' + currentLevel + ' - CLEAR');
        }
        ctx.font = '600 8px sans-serif';
        ctx.fillStyle = 'rgba(245,249,255,0.95)';
        ctx.fillText(levelLabel, x, y + h * 0.78);
      }
      ctx.restore();
    }

    function drawWeaponAmmoPanel() {
      const weapon = getCurrentWeapon();
      const state = getWeaponRuntimeState(weapon);
      if (!weapon || !state) return;

      const itemSize = 9;
      // Compute columns needed so primary panel never exceeds half the canvas height
      let primaryCols = 1;
      let primaryRows = 1;
      let primaryH;
      if (weapon.type === 'electric' || weapon.type === 'flamethrower') {
        primaryH = 96;
      } else {
        const maxClip = Math.max(1, state.maxClip || 1);
        const maxAvailRows = Math.max(4, Math.floor((H / 2 - 44) / itemSize));
        primaryCols = Math.max(1, Math.ceil(maxClip / maxAvailRows));
        primaryRows = Math.ceil(maxClip / primaryCols);
        primaryH = 20 + primaryRows * itemSize + 20;
      }
      const panelW = Math.max(56, primaryCols * itemSize + 28);
      const px = W - panelW - 12;
      let py = 12;

      ctx.save();
      ctx.textAlign = 'center';

      const g = ctx.createLinearGradient(px, py, px, py + primaryH);
      g.addColorStop(0, 'rgba(32,37,44,0.97)');
      g.addColorStop(1, 'rgba(14,17,22,0.98)');
      ctx.fillStyle = g;
      ctx.strokeStyle = 'rgba(185,196,210,0.72)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(px, py, panelW, primaryH, 8);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#e7edf5';
      ctx.font = '600 10px sans-serif';
      ctx.fillText(weapon.name.slice(0, 9), px + panelW * 0.5, py + 13);

      if (weapon.type === 'electric' || weapon.type === 'flamethrower') {
        const ratio = state.maxBattery > 0 ? clamp01(state.battery / state.maxBattery) : 0;
        const bx = px + 14, by = py + 20;
        const bw = panelW - 28, bh = primaryH - 42;
        ctx.strokeStyle = 'rgba(222,235,248,0.7)';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, bw, bh);
        if (weapon.type !== 'flamethrower') {
          // Battery top nub (not shown for gas tanks)
          ctx.strokeRect(bx + bw * 0.3, by - 5, bw * 0.4, 5);
        }
        ctx.fillStyle = 'rgba(18,28,40,0.9)';
        ctx.fillRect(bx + 1, by + 1, bw - 2, bh - 2);
        if (ratio > 0) {
          const fillH = Math.max(1, (bh - 2) * ratio);
          const fg = ctx.createLinearGradient(bx, by + bh, bx, by);
          if (weapon.type === 'flamethrower') {
            const cfg = weapon.flamethrower || {};
            fg.addColorStop(0, cfg.color1 || '#ff6600');
            fg.addColorStop(1, cfg.color2 || '#ff9900');
          } else {
            fg.addColorStop(0, '#63dcff');
            fg.addColorStop(1, '#a6f2ff');
          }
          ctx.fillStyle = fg;
          ctx.fillRect(bx + 1, by + bh - 1 - fillH, bw - 2, fillH);
        }
        ctx.fillStyle = '#dce9f7';
        ctx.font = '600 10px sans-serif';
        const status = state.reloading ? 'RLD' : (state.battery.toFixed(1) + 's');
        ctx.fillText(status, px + panelW * 0.5, py + primaryH - 7);
      } else {
        const maxClip = Math.max(1, state.maxClip || 1);
        const current = Math.max(0, state.clip || 0);
        const areaX = px + panelW * 0.5 - primaryCols * itemSize * 0.5;
        const areaY = py + 20;

        for (let i = 0; i < maxClip; i++) {
          const col = Math.floor(i / primaryRows);
          const row = i % primaryRows;
          const cx = areaX + col * itemSize + itemSize * 0.5;
          const cy = areaY + row * itemSize + itemSize * 0.5;
          const alpha = i < current ? 0.92 : 0.20;
          ctx.save();
          ctx.globalAlpha = alpha;
          if (weapon.projectile && weapon.projectile.drawLength > 0) {
            const color = weapon.projectile.color || '#ff6666';
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            ctx.moveTo(cx - 2, cy + 3);
            ctx.lineTo(cx + 2, cy - 3);
            ctx.stroke();
          } else {
            const color = (weapon.projectile && weapon.projectile.color) || '#ffa040';
            const rr = Math.max(1.3, Math.min(3.2, ((weapon.projectile && weapon.projectile.radius) || 3) * 0.42));
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(cx, cy, rr, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }

        ctx.fillStyle = '#dce9f7';
        ctx.font = '600 10px sans-serif';
        const status = state.reloading ? 'RLD' : (current + '/' + maxClip);
        ctx.fillText(status, px + panelW * 0.5, py + primaryH - 7);
      }

      py += primaryH + 6;

      // == Rocket / secondary panel ==============================
      const rocketWeapon = getCurrentRocketWeapon();
      const rocketState = rocketWeapon ? getWeaponRuntimeState(rocketWeapon) : null;
      const isMayoWeapon = rocketWeapon && rocketWeapon.type === 'mayo';
      const rocketCap = (!isMayoWeapon && rocketWeapon) ? (rocketWeapon.clipSize > 2 ? rocketWeapon.clipSize : getEffectiveRocketCapacity(rocketWeapon)) : 2;
      const rocketRows = (!isMayoWeapon && rocketWeapon) ? Math.max(1, Math.ceil(rocketCap / 2)) : 1;
      const rocketH = isMayoWeapon ? 96 : (rocketWeapon ? Math.max(52, 22 + rocketRows * 18 + 14) : 36);

      const rg = ctx.createLinearGradient(px, py, px, py + rocketH);
      rg.addColorStop(0, 'rgba(90,70,70,0.88)');
      rg.addColorStop(1, 'rgba(60,45,45,0.90)');
      ctx.fillStyle = rg;
      ctx.strokeStyle = 'rgba(180,192,206,0.60)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(px, py, panelW, rocketH, 8);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = '#e7edf5';
      ctx.font = '600 10px sans-serif';
      ctx.fillText(isMayoWeapon ? (rocketWeapon.name.slice(0, 9)) : 'ROCKETS', px + panelW * 0.5, py + 13);

      if (!rocketWeapon || !rocketState) {
        ctx.fillStyle = 'rgba(180,192,206,0.5)';
        ctx.font = '10px sans-serif';
        ctx.fillText('none', px + panelW * 0.5, py + 26);
      } else if (isMayoWeapon) {
        // Battery bar for mayo weapons
        const ratio = rocketState.maxBattery > 0 ? clamp01(rocketState.battery / rocketState.maxBattery) : 0;
        const bx = px + 14, by = py + 20;
        const bw = panelW - 28, bh = rocketH - 42;
        ctx.strokeStyle = 'rgba(222,235,248,0.7)';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, bw, bh);
        ctx.strokeRect(bx + bw * 0.3, by - 5, bw * 0.4, 5);
        ctx.fillStyle = 'rgba(18,28,40,0.9)';
        ctx.fillRect(bx + 1, by + 1, bw - 2, bh - 2);
        if (ratio > 0) {
          const fillH = Math.max(1, (bh - 2) * ratio);
          const cfg = rocketWeapon.mayo || {};
          const mc1 = cfg.color1 || '#f5f0a0';
          const mc2 = cfg.color2 || '#d4c830';
          const fg = ctx.createLinearGradient(bx, by + bh, bx, by);
          fg.addColorStop(0, mc1);
          fg.addColorStop(1, mc2);
          ctx.fillStyle = fg;
          ctx.fillRect(bx + 1, by + bh - 1 - fillH, bw - 2, fillH);
        }
        ctx.fillStyle = '#dce9f7';
        ctx.font = '600 10px sans-serif';
        const mStatus = rocketState.reloading ? 'RLD' : (rocketState.battery.toFixed(1) + 's');
        ctx.fillText(mStatus, px + panelW * 0.5, py + rocketH - 7);
      } else {
        const loaded = (rocketState && rocketState.rocketLoaded) ? rocketState.rocketLoaded : Array(rocketCap).fill(true);
        const slotW = (panelW - 12) / 2;
        const slotH = 18;
        const startY = py + 22;
        for (let i = 0; i < rocketCap; i++) {
          const col = i % 2;
          const row = Math.floor(i / 2);
          const rcx = px + 6 + slotW * (col + 0.5);
          const rcy = startY + row * slotH;
          const parts = rocketPartImages[rocketWeapon.id] || null;
          const part = (parts && parts[i % 2]) ? parts[i % 2] : null;
          ctx.save();
          ctx.globalAlpha = (i < loaded.length ? loaded[i] : true) ? 0.95 : 0.22;
          if (part) {
            const scale = Math.min(0.82, (slotW - 4) / part.width);
            const dw = part.width * scale;
            const dh = part.height * scale;
            ctx.drawImage(part, rcx - dw * 0.5, rcy - dh * 0.5, dw, dh);
          } else {
            ctx.fillStyle = '#ff8b47';
            ctx.beginPath();
            ctx.moveTo(rcx + 6, rcy);
            ctx.lineTo(rcx - 4, rcy - 3);
            ctx.lineTo(rcx - 4, rcy + 3);
            ctx.closePath();
            ctx.fill();
          }
          ctx.restore();
        }
        const rStatus = rocketState.reloading ? 'RLD' : ((rocketState.clip || 0) + '/' + rocketCap);
        ctx.fillStyle = '#dce9f7';
        ctx.font = '600 10px sans-serif';
        ctx.fillText(rStatus, px + panelW * 0.5, py + rocketH - 7);
      }

      ctx.restore();
    }

    function drawIntroButton(x, y) {
      // simple grey button as it appears over the video
      const w = 88, h = 28, r = 4;
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(x-w/2, y-h/2, w, h, r);
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fill();
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = 'white';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u23ED Skip Ad', x, y);
      ctx.restore();
    }

    function drawCrosshair(x, y) {
      const R=13, inner=5, gap=3;
      const reloadProgress = getCurrentReloadProgress();

      // Rocket reload progress (0=just started, 1=done, null=not reloading)
      const rocketWeapon = getCurrentRocketWeapon();
      const rocketState = rocketWeapon ? getWeaponRuntimeState(rocketWeapon) : null;
      let rocketReloadProgress = null;
      if (rocketState && rocketState.reloading) {
        const rSec = getEffectiveReloadSeconds(rocketWeapon);
        rocketReloadProgress = 1 - clamp01(rocketState.reloadTimer / rSec);
      }

      ctx.save();
      ctx.strokeStyle='rgba(255,70,70,0.95)';
      ctx.lineWidth=1.5; ctx.shadowColor='#f44'; ctx.shadowBlur=7;

      // Circle: full when not reloading primary, grows as arc during reload
      if (reloadProgress === null) {
        ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI * 2); ctx.stroke();
      } else {
        // Arc grows from 0 to full as reload completes
        if (reloadProgress > 0.01) {
          ctx.beginPath();
          ctx.arc(x, y, R, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * reloadProgress);
          ctx.stroke();
        }
      }

      // Rocket reload: red filled pie inside the crosshair (7.8 = 50% bigger than 5.2)
      if (rocketReloadProgress !== null && rocketReloadProgress > 0.01) {
        ctx.fillStyle = 'rgba(255,70,70,0.75)';
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.arc(x, y, 7.8, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * rocketReloadProgress);
        ctx.closePath();
        ctx.fill();
      }

      // 4 lines -- always visible
      ctx.beginPath(); ctx.moveTo(x,y-inner-gap); ctx.lineTo(x,y-R-2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,y+inner+gap); ctx.lineTo(x,y+R+2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-inner-gap,y); ctx.lineTo(x-R-2,y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+inner+gap,y); ctx.lineTo(x+R+2,y); ctx.stroke();
      ctx.restore();
    }

    // === Start ================================================================
    async function initSubmission() {
      await Promise.all([
        loadEnemyConfigFromJson(),
        loadSpaceBugAssets(),
        loadWeaponConfigFromJson(),
        loadShipColorsFromJson()
      ]);

      if (AUTO_START_GAME && phase === 'idle') {
        startGameDirect();
      }
    }

    initSubmission();
    requestAnimationFrame(update);
