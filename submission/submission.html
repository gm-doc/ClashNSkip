<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clash'N Skip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      background: transparent;
      margin: 0; padding: 0;
      overflow: hidden;
    }
    #overlay-container {
      position: relative;
      width: 960px; height: 540px;
    }
    #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 960px; height: 540px;
    }
    /* The real DOM skip button - used only during idle phase in bottom-right */
    #skip-idle {
      display: none;
      position: absolute;
      bottom: 18px;
      right: 0;
      padding: 8px 16px;
      background: rgba(0,0,0,0.65);
      border: 1px solid #555;
      border-right-width: 0;
      border-radius: 4px 0 0 4px;
      font-size: 0.85rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      letter-spacing: 0.5px;
      z-index: 20;
      user-select: none;
      font-family: sans-serif;
    }
    /* Game-phase skip button drawn on canvas - this DOM one hidden after intro */
    #skip-idle.hidden { display: none; }
    #volume-control {
      position: absolute;
      left: 6px;
      bottom: 6px;
      z-index: 24;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 4px;
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(32,37,44,0.97) 0%, rgba(14,17,22,0.98) 100%);
      border: 1px solid rgba(185,196,210,0.72);
      font: 700 5px sans-serif;
      color: #d7e6f3;
      letter-spacing: 0.06em;
      user-select: none;
      width: 130px;
      box-sizing: border-box;
    }
    #volume-slider {
      flex: 1;
      min-width: 0;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: linear-gradient(90deg, rgba(185,196,210,0.75) 0%, rgba(32,37,44,0.7) 100%);
      border-radius: 2px;
      border: 1px solid rgba(185,196,210,0.35);
      outline: none;
      cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(185,196,210,0.97) 0%, rgba(110,125,142,0.97) 100%);
      border: 1px solid rgba(185,196,210,0.72);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.55);
    }
    #volume-slider::-moz-range-thumb {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(185,196,210,0.97) 0%, rgba(110,125,142,0.97) 100%);
      border: 1px solid rgba(185,196,210,0.72);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.55);
    }
    /* hide system cursor everywhere in game */
    body.game-started { cursor: none; }
    #upgrade-sections {
      scrollbar-color: #44607a rgba(14,17,22,0.98);
      scrollbar-width: thin;
    }
    #upgrade-sections::-webkit-scrollbar {
      width: 10px;
    }
    #upgrade-sections::-webkit-scrollbar-track {
      background: rgba(10,21,34,0.92);
      border-radius: 10px;
    }
    #upgrade-sections::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #5a7a95 0%, #3e5f7d 100%);
      border-radius: 10px;
      border: 2px solid rgba(10,21,34,0.92);
    }
    @keyframes upgradeAffordableFlash {
      0%, 100% { box-shadow: 0 0 0 0 rgba(247,223,138,0); border-color: rgba(185,196,210,0.72); }
      50% { box-shadow: 0 0 8px 3px rgba(247,223,138,0.65); border-color: rgba(247,223,138,0.9); }
    }
    .upgrade-affordable { animation: upgradeAffordableFlash 1.1s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="overlay-container">
    <canvas id="gameCanvas" width="960" height="540"></canvas>
    <button id="skip-idle">&#x23ED; Skip Ad</button>
    <div id="volume-control">
      <span id="volume-label" style="font-size:14px;line-height:1;">??</span>
      <input id="volume-slider" type="range" min="0" max="100" step="1" value="30">
    </div>
  </div>

  <script src="assets/player/weapons/weapon-config.js"></script>
  <script src="assets/enemies/enemy-config.js"></script>
  <script src="assets/player/ship/ship-colors.js"></script>
  <script>
  (function(window, document) {

    // Polyfill CanvasRenderingContext2D.roundRect (Chrome 99+, Firefox 112+)
    if (typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        const rad = Math.min(typeof r === 'number' ? r : (Array.isArray(r) ? r[0] : 0), w / 2, h / 2);
        this.moveTo(x + rad, y);
        this.lineTo(x + w - rad, y);
        this.quadraticCurveTo(x + w, y, x + w, y + rad);
        this.lineTo(x + w, y + h - rad);
        this.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
        this.lineTo(x + rad, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - rad);
        this.lineTo(x, y + rad);
        this.quadraticCurveTo(x, y, x + rad, y);
        this.closePath();
      };
    }

    function adSuccess() { window.top.postMessage({ type: 'success' }, '*'); }
    function pauseVideo() { window.top.postMessage({ type: 'pause' }, '*'); }

    function showGameOver() {
      // Pause the game
      gamePaused = true;
      // Hide skip overlay
      if (typeof skipOverlay !== 'undefined') skipOverlay.style.display = 'none';

      const score = Math.max(0, Math.floor(cash));
      const overlay = document.createElement('div');
      overlay.id = 'gameover-overlay';
      overlay.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(3,7,14,0.88);font-family:sans-serif;';
      overlay.innerHTML = `
        <div style="background:linear-gradient(180deg,rgba(32,37,44,0.97) 0%,rgba(14,17,22,0.98) 100%);border:2px solid #e53e3e;border-radius:14px;padding:28px 48px;text-align:center;color:#e7f2ff;box-shadow:0 0 60px rgba(229,62,62,0.45);">
          <img src="assets/player/ship/logo.png${_logoCacheBust}" id="gameover-logo-img" style="height:120px;width:auto;opacity:0.92;image-rendering:pixelated;margin-bottom:10px;" onerror="this.style.display='none'">
          <div style="font-size:38px;font-weight:900;letter-spacing:0.06em;color:#e53e3e;text-shadow:0 0 20px #e53e3e88;margin-bottom:10px;">GAME OVER</div>
          <div style="font-size:16px;opacity:0.72;margin-bottom:8px;">The skip button was destroyed!</div>
          <div style="font-size:26px;font-weight:700;color:#ffd94a;margin-bottom:28px;">Score: $${score.toLocaleString()}</div>
          <div style="display:flex;gap:14px;justify-content:center;">
            <button id="gameover-playagain" style="padding:10px 22px;border:1px solid #3cb872;background:linear-gradient(180deg,rgba(32,37,44,0.97) 0%,rgba(14,17,22,0.98) 100%);color:#3cb872;border-radius:7px;cursor:pointer;font:700 14px sans-serif;">Play Again</button>
            <button id="gameover-skipad" style="padding:10px 22px;border:1px solid #4a8fcb;background:linear-gradient(180deg,rgba(32,37,44,0.97) 0%,rgba(14,17,22,0.98) 100%);color:#7ec8ff;border-radius:7px;cursor:pointer;font:700 14px sans-serif;">Skip Ad</button>
          </div>
        </div>`;
      document.getElementById('overlay-container').appendChild(overlay);
      overlay.querySelector('#gameover-playagain').addEventListener('click', () => {
        overlay.remove();
        gamePaused = false;
        startFreshGame();
      });
      overlay.querySelector('#gameover-skipad').addEventListener('click', () => {
        overlay.remove();
        gamePaused = false;
        adActive = false;
        adSuccess();
      });
    }

    function hitSkipButton() {
      // Seraph Secure dome intercepts the hit
      if (shipProtectionOwned.seraphSecure && seraphDome.active && seraphDome.hitsLeft > 0) {
        seraphDome.hitsLeft--;
        seraphDome.crackLevel = 3 - seraphDome.hitsLeft;
        seraphDome.visible = true;
        btnFlash = 0.2;
        if (seraphDome.hitsLeft <= 0) {
          seraphDome.active = false;
            seraphDome.reloadTimer = Math.max(1, Number(getProtectCfg('seraphSecure').reloadSeconds) || 30);
          seraphDome.visible = false;
          spawnExplosion(CX, CY);
          playSound(audioConfig.events && audioConfig.events.explosion);
        }
        return;
      }
      skipBtnHealth = Math.max(0, skipBtnHealth - 0.1);
      btnFlash = 0.4;
      playSound(audioConfig.events && audioConfig.events.warning);
      if (skipBtnHealth <= 0) {
        if (!skipReady) {
          // Timer still running -- fail the ad
          adActive = false;
          skipOverlay.style.display = 'none';
          window.top.postMessage({ type: 'fail' }, '*');
        } else {
          // Timer has expired (skipReady) -- GAME OVER
          showGameOver();
        }
      }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const AUTO_START_GAME = urlParams.get('autostart') === '1';
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');
    const W = Math.max(960, Number.parseInt(urlParams.get('w') || '960', 10) || 960);
    const H = Math.max(540, Number.parseInt(urlParams.get('h') || '540', 10) || 540);
    const START_LEVEL = Math.max(1, Math.min(4, parseInt(urlParams.get('level') || '1', 10) || 1));
    const CX = W / 2, CY = H / 2;
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const overlayContainer = document.getElementById('overlay-container');
    const volumeControl = document.getElementById('volume-control');
    const volumeSlider = document.getElementById('volume-slider');
    const volumeLabel = document.getElementById('volume-label');
    overlayContainer.style.width = W + 'px';
    overlayContainer.style.height = H + 'px';

    // === Assets ==============================================================
    const imgShipBody           = new Image(); imgShipBody.src           = 'assets/player/ship/body.png';
    const imgShipEngines2       = new Image(); imgShipEngines2.src       = 'assets/player/ship/engines2.png';
    const imgShipEngines3       = new Image(); imgShipEngines3.src       = 'assets/player/ship/engines3.png';
    const imgShipSelfDestruct2  = new Image(); imgShipSelfDestruct2.src  = 'assets/player/ship/self-destruct2.png';
    const imgShipSelfDestruct3  = new Image(); imgShipSelfDestruct3.src  = 'assets/player/ship/self-destruct3.png';
    const imgShipHeavyBody      = new Image(); imgShipHeavyBody.src      = 'assets/player/ship/heavy_body.png';
    const imgShipHeavyEngines   = new Image(); imgShipHeavyEngines.src   = 'assets/player/ship/heavy_engines.png';
    const imgShipHeavyEngines2  = new Image(); imgShipHeavyEngines2.src  = 'assets/player/ship/heavy_engines2.png';
    const imgShipEliteBody      = new Image(); imgShipEliteBody.src      = 'assets/player/ship/elite_body.png';
    const imgShipEliteEngines   = new Image(); imgShipEliteEngines.src   = 'assets/player/ship/elite_engines.png';
    const imgShipEliteEngines2  = new Image(); imgShipEliteEngines2.src  = 'assets/player/ship/elite_engines2.png';
    const imgEachAndEverythingIcon = new Image(); imgEachAndEverythingIcon.src = 'assets/player/weapons/each_and_everything.png';
    const imgWWWWIcon              = new Image(); imgWWWWIcon.src              = 'assets/player/ship/WWWW.png';
    const imgSeraphSecureIcon      = new Image(); imgSeraphSecureIcon.src      = 'assets/player/ship/SeraphSecure.png';
    const _logoCacheBust = '?v=' + Date.now();
    const imgLogo                  = new Image(); imgLogo.src                  = 'assets/player/ship/logo.png' + _logoCacheBust;
    const imgUFO  = [new Image(), new Image(), new Image()];
    imgUFO[0].src = 'assets/enemies/UFO/UFO1.png';
    imgUFO[1].src = 'assets/enemies/UFO/UFO2.png';
    imgUFO[2].src = 'assets/enemies/UFO/UFO3.png';
    const bugFrames = [new Image(), new Image(), new Image(), new Image()];
    bugFrames[0].src = 'assets/enemies/space_bugs/bug/bug1.png';
    bugFrames[1].src = 'assets/enemies/space_bugs/bug/bug2.png';
    bugFrames[2].src = 'assets/enemies/space_bugs/bug/bug3.png';
    bugFrames[3].src = 'assets/enemies/space_bugs/bug/bug4.png';
    const motherBugFrames = [new Image(), new Image(), new Image(), new Image()];
    motherBugFrames[0].src = 'assets/enemies/space_bugs/mother_bug/mother bug1.png';
    motherBugFrames[1].src = 'assets/enemies/space_bugs/mother_bug/mother bug2.png';
    motherBugFrames[2].src = 'assets/enemies/space_bugs/mother_bug/mother bug3.png';
    motherBugFrames[3].src = 'assets/enemies/space_bugs/mother_bug/mother bug4.png';
    const eggFrames = [new Image(), new Image(), new Image()];
    eggFrames[0].src = 'assets/enemies/space_bugs/egg/egg1.png';
    eggFrames[1].src = 'assets/enemies/space_bugs/egg/egg2.png';
    eggFrames[2].src = 'assets/enemies/space_bugs/egg/egg3.png';
    const imgTinfoilCatProjectile = new Image();
    imgTinfoilCatProjectile.src = 'assets/player/weapons/tinfoil_cat.png';
    const SOUND_ASSET_PATH = 'assets/sounds/';

    // === Stars ================================================================
    const stars = Array.from({length:180}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.6+0.2, a: Math.random()*0.5+0.3,
      ts: Math.random()*0.02+0.005, to: Math.random()*Math.PI*2
    }));

    // === Constants ============================================================
    const ORBIT_RX    = 72;
    const ORBIT_RY    = 48;
    const UFO_SIZE    = 82;
    const SHIP_SIZE   = 88;
    const SHIP_HITBOX_SCALE = 0.175;
    const BULLET_SPEED = 8;
    const UFO_SPEED   = 0.78;
    const LEVEL_DURATION = 60;
    const INTRO_BTN_OFFSET = UFO_SIZE * 0.3;
    const INTRO_UFO_CENTER_Y = CY - INTRO_BTN_OFFSET;

    // === Game state ===========================================================
    let mouseX = CX, mouseY = CY - 100;
    let shipAngle      = -Math.PI / 2;
    let bullets        = [], ufos = [], particles = [], fragments = [];
    let rockets        = [];
    let syringes       = [];
    let electricBolts  = [];
    let electricTargetIds = [];
    let flamethrowerFiring = false;
    let flamethrowerData   = null;
    let mayoFiring         = false;
    let mayoData           = null;
    let rocketFireHeld     = false;
    let ufoSpawnTimer  = 9999;
    let nextUfoId      = 1;
    let nextFormationId = 1;
    let shipAlive      = true;
    let shipRespawnTimer   = 0;
    let shipImmunityTimer  = 0;
    let skipTimer      = 240;
    let skipReady      = false;
    let skipBtnHealth  = 1.0;
    let currentLevel   = 1;
    let levelTimeLeft  = LEVEL_DURATION;
    let levelActive    = true;
    let levelIntroTimer = 0;
    let levelIntroText = '';
    let endlessMode    = false;
    let endlessModeStartTime = 0;
    let fireHeld       = false;
    let fireTimer      = 0;
    let btnFlash       = 0;
    let upgradeBtnFlashTimer = 0;
    const UPGRADE_MILESTONES = [1000, 5000, 10000, 20000, 50000, 100000];
    let upgradeMilestonesHit = new Set();
    let cash           = 100000;
    let gameStartTime  = 0;
    let adActive       = false;
    let adStartedReceived = false;
    let gamePaused = false;
    let upgradeMenuOpen = false;
    let upgradeMenuTab = 'primary';
    let upgradePreviewPrimaryId = null;
    let upgradePreviewSecondaryId = null;
    let upgradePreviewShipId = 'armor_1';
    let shipColorsConfig = null;
    let shipUpgradeLevels = { armor: 1, engine: 1, selfDestruct: 1 };
    let shipArmorHitsLeft = 1;
    let shipProtectionOwned = { eachAndEverything: false, wwwwtsactp: false, seraphSecure: false };
    let eachProtection = { active: false, hitsLeft: 3, reloadTimer: 0, x: 0, y: 0 };
    let wwwwProtection = { active: false, hitsLeft: 5, reloadTimer: 0, x: 0, y: 0, vx: 1.5, vy: 1.2, danceAngle: 0 };
    let seraphDome = { active: false, hitsLeft: 3, reloadTimer: 0, crackLevel: 0, visible: false, regenTimer: 0 };
    let weaponConfigLoaded = false;
    let weaponDescriptions = {};
    let weaponCatalog = [];
    let weaponMap = {};
    let weaponImages = {};
    let rocketPartImages = {};
    let weaponRuntime = {};
    let weaponUpgradeLevels = {};
    let ownedWeaponIds = {};
    let weaponEconomyConfig = {
      defaultOwnedPrimary: ['gun'],
      defaultOwnedSecondary: []
    };
    let weaponUpgradeConfig = {
      primary: {
        fireRate: { maxLvl: 5, costByLevel: [100, 200, 300, 400, 500] },
        clipSize: { maxLvl: 5, costByLevel: [100, 200, 300, 400, 500] },
        reloadSpeed: { maxLvl: 5, costByLevel: [100, 200, 300, 400, 500] }
      },
      secondary: {
        categories: {
          rockets: [
            { key: 'reloadSpeed', label: 'Reload Speed', maxLvl: 5 },
            { key: 'amount', label: 'Amount', maxLvl: 2 },
            { key: 'flightSpeed', label: 'Flight Speed', maxLvl: 5 }
          ],
          rocket_launcher: [
            { key: 'blastRadius', label: 'Blast Radius', maxLvl: 5 },
            { key: 'reloadSpeed', label: 'Reload Speed', maxLvl: 5 },
            { key: 'flightSpeed', label: 'Flight Speed', maxLvl: 5 }
          ],
          freeze: [
            { key: 'blastRadius', label: 'Blast Radius', maxLvl: 5 },
            { key: 'amount', label: 'Amount', maxLvl: 2 },
            { key: 'flightSpeed', label: 'Flight Speed', maxLvl: 5 }
          ],
          nuclear: [
            { key: 'blastRadius', label: 'Blast Radius', maxLvl: 5 },
            { key: 'reloadSpeed', label: 'Reload Speed', maxLvl: 5 },
            { key: 'flightSpeed', label: 'Flight Speed', maxLvl: 5 }
          ]
        },
        costs: {
          baseCostByLevel: [100, 200, 300, 400, 500],
          amountCostByLevel: [1000, 2000],
          categoryMultiplier: { nuclear: 2 }
        }
      }
    };
    let shipSystemsConfig = {
      armor: {
        title: 'Armor',
        levels: [
          { name: 'Default Armor',  description: 'Standard hull plating. Provides 1 hit point before the ship is destroyed.',          cost: 0,     hitsLeft: 1 },
          { name: 'Heavy Armor',    description: 'Reinforced composite plating. Provides 2 hit points before destruction.',            cost: 20000, hitsLeft: 2 },
          { name: 'Elite Armor',    description: 'Military-grade armor alloy. Provides 3 hit points before destruction.',              cost: 10000, hitsLeft: 3 }
        ]
      },
      engine: {
        title: 'Engines',
        levels: [
          { name: 'Jet Engines',         description: 'Standard ion thrusters. Baseline turn and movement speed.',                     cost: 0,     speedMult: 1.0  },
          { name: 'Additional Engines',  description: 'Extra engine pods provide lateral thrust. +25% turn and movement speed.',       cost: 10000, speedMult: 1.25 },
          { name: 'Side Thrusters',      description: 'Full thruster array for maximum agility. +50% turn and movement speed.',        cost: 25000, speedMult: 1.5  }
        ]
      },
      selfDestruct: {
        title: 'Self-Destruct',
        baseBlastRadius: 350,
        levels: [
          { name: 'Default Module',   description: 'Basic explosive charge. 50% explosion radius on death.',                           cost: 0,     radiusMult: 0.5  },
          { name: 'Wired TNT',        description: 'TNT charge array wired for maximum spread. 75% explosion radius on death.',        cost: 10000, radiusMult: 0.75 },
          { name: 'Wired Little Boy', description: 'Nuclear-grade warhead. 100% full-screen explosion radius on death.',               cost: 25000, radiusMult: 1.0  }
        ]
      },
      protection: {
        eachAndEverything: { name: 'Each & Everything', description: 'Deploys a Windows 95 popup in empty screen space. Destroys up to 3 enemies that run into it, then vanishes. Reappears after 30s.', cost: 2000,  hitsLeft: 3, reloadSeconds: 30 },
        wwwwtsactp:        { name: 'WWWWTSACTP',        description: 'A dancing popup that destroys 5 enemies in its path. Overrides the main theme with WWWW music while active. Reloads in 30s.',      cost: 5000,  hitsLeft: 5, reloadSeconds: 30 },
        seraphSecure:      { name: 'Seraph Secure',     description: 'Projects a blue energy dome around the skip button. Absorbs 3 enemy hits before breaking. Reloads in 60s.',                       cost: 20000, hitsLeft: 3, reloadSeconds: 60, domeRadius: 62 }
      }
    };
    function getShipSysCfg(key) { return (shipSystemsConfig[key] && shipSystemsConfig[key].levels) || []; }
    function getShipSysLevel(key, lvl) { const arr = getShipSysCfg(key); return arr[Math.min(arr.length - 1, Math.max(0, lvl - 1))] || {}; }
    function getProtectCfg(key) { return (shipSystemsConfig.protection && shipSystemsConfig.protection[key]) || {}; }
    let audioConfig = {
      enabled: true,
      masterVolume: 0.3,
      sounds: {
        gun_shot: { file: 'gun_shot.mp3', volume: 0.59, minIntervalMs: 25 },
        shotgun: { file: 'shotgun.mp3', volume: 0.63, minIntervalMs: 70 },
        laser_shot: { file: 'laser_shot.mp3', volume: 0.56, minIntervalMs: 45 },
        pulse_shot: { file: 'pulse_shot.mp3', volume: 0.61, minIntervalMs: 55 },
        meow: { file: 'meow.mp3', volume: 0.65, minIntervalMs: 55 },
        rocket_launch: { file: 'rocket_launch.mp3', volume: 0.70, minIntervalMs: 90 },
        syringe: { file: 'syringe.mp3', volume: 0.63, minIntervalMs: 80 },
        squash: { file: 'squash.mp3', volume: 0.65, minIntervalMs: 170 },
        flamethrower_start: { file: 'flamethrower_start.mp3', volume: 0.68 },
        flamethrower_continue: { file: 'flamethrower_continue.mp3', volume: 0.56, loop: true },
        electric: { file: 'electric.mp3', volume: 0.50, loop: true },
        bug_splat: { file: 'bug_splat.mp3', volume: 0.65, minIntervalMs: 90 },
        explosion: { file: 'explosion.mp3', volume: 0.74, minIntervalMs: 70 },
        UFO_ray: { file: 'UFO_ray.mp3', volume: 0.67, minIntervalMs: 150 },
        splat: { file: 'splat.mp3', volume: 0.65, minIntervalMs: 80 },
        error: { file: 'error.mp3', volume: 0.70 },
        each_and_everything: { file: 'each_and_everything.mp3', volume: 0.75 },
        wwwwtsactp: { file: 'wwwwtsactp.mp3', volume: 0.70, loop: true }
      },
      weaponShot: {
        gun: 'gun_shot',
        gun2: 'gun_shot',
        gun3: 'gun_shot',
        shotgun: 'shotgun',
        shotgun2: 'shotgun',
        shotgun3: 'shotgun',
        laser: 'laser_shot',
        laser2: 'laser_shot',
        pulse: 'pulse_shot',
        pulse2: 'pulse_shot',
        pulse3: 'meow',
        rockets: 'rocket_launch',
        rockets2: 'rocket_launch',
        rockets3: 'rocket_launch',
        rocket_launcher: 'rocket_launch',
        big_papa: 'rocket_launch',
        little_boy: 'rocket_launch',
        moon_syringe: 'syringe',
        corrosive_syringe: 'syringe',
        mayo: 'squash',
        wasabi_mayo: 'squash'
      },
      events: {
        bugDeath: 'bug_splat',
        explosion: 'explosion',
        ufoRay: 'UFO_ray',
        coat: 'splat',
        error: 'error',
        eachAndEverything: 'each_and_everything',
        wwwwtsactp: 'wwwwtsactp'
      },

        flamethrowerLoopKey: 'flamethrower_continue',

    const soundBaseCache = {};
    const soundStartByTag = {};
    const soundStartKeyByTag = {};
    const soundLoopByTag = {};
    const soundLoopKeyByTag = {};
    const soundLoopDelayTimers = {};
    const soundContinuousActive = { flamethrower: false, electric: false };
    const soundLastPlayedAt = {};

    function mergeAudioConfig(patch) {
      if (!patch || typeof patch !== 'object') return;
      if (typeof patch.enabled === 'boolean') audioConfig.enabled = patch.enabled;
      if (Number.isFinite(Number(patch.masterVolume))) audioConfig.masterVolume = Number(patch.masterVolume);
      if (patch.sounds && typeof patch.sounds === 'object') {
        audioConfig.sounds = Object.assign({}, audioConfig.sounds || {}, patch.sounds || {});
      }
      if (patch.weaponShot && typeof patch.weaponShot === 'object') {
        audioConfig.weaponShot = Object.assign({}, audioConfig.weaponShot || {}, patch.weaponShot || {});
      }
      if (patch.events && typeof patch.events === 'object') {
        audioConfig.events = Object.assign({}, audioConfig.events || {}, patch.events || {});
      }
      if (patch.continuous && typeof patch.continuous === 'object') {
        audioConfig.continuous = Object.assign({}, audioConfig.continuous || {}, patch.continuous || {});
      }
      audioConfig.masterVolume = clamp01(audioConfig.masterVolume);
      updateVolumeControlUi();
      syncLoopVolumes();
    }

    function updateVolumeControlUi() {
      if (!volumeSlider) return;
      const pct = Math.round(clamp01(audioConfig.masterVolume) * 100);
      volumeSlider.value = String(pct);
    }

    function syncLoopVolumes() {
      for (const tag of Object.keys(soundStartByTag)) {
        const startAudio = soundStartByTag[tag];
        const key = soundStartKeyByTag[tag];
        if (!startAudio || !key) continue;
        const def = getSoundDef(key);
        startAudio.volume = resolveSoundVolume(def, 1);
      }
      for (const tag of Object.keys(soundLoopByTag)) {
        const loopAudio = soundLoopByTag[tag];
        const key = soundLoopKeyByTag[tag];
        if (!loopAudio || !key) continue;
        const def = getSoundDef(key);
        loopAudio.volume = resolveSoundVolume(def, 1);
      }
    }

    function setMasterVolume(v) {
      audioConfig.masterVolume = clamp01(v);
      updateVolumeControlUi();
      syncLoopVolumes();
    }

    function getSoundDef(key) {
      if (!key) return null;
      const all = audioConfig && audioConfig.sounds;
      return all && all[key] ? all[key] : null;
    }

    function getSoundSrc(def) {
      if (!def) return '';
      const file = String(def.file || '').trim();
      if (!file) return '';
      if (/^(https?:|data:|blob:|assets\/)/i.test(file)) return file;
      return SOUND_ASSET_PATH + file;
    }

    function getSoundBaseAudio(key) {
      const def = getSoundDef(key);
      const src = getSoundSrc(def);
      if (!def || !src) return null;
      const cached = soundBaseCache[key];
      if (cached && cached.src === src) return cached;
      const a = new Audio(src);
      a.preload = 'auto';
      soundBaseCache[key] = a;
      return a;
    }

    function resolveSoundVolume(def, volumeMult) {
      const base = Number.isFinite(Number(def && def.volume)) ? Number(def.volume) : 1;
      const mult = Number.isFinite(Number(volumeMult)) ? Number(volumeMult) : 1;
      const master = Number.isFinite(Number(audioConfig && audioConfig.masterVolume)) ? Number(audioConfig.masterVolume) : 1;
      return clamp01(base * mult * master);
    }

    function playSound(key, opts) {
      const o = opts || {};
      if (!audioConfig || audioConfig.enabled === false) return null;
      const def = getSoundDef(key);
      if (!def) return null;
      const now = performance.now();
      const minGap = Number.isFinite(Number(o.minIntervalMs)) ? Number(o.minIntervalMs)
        : (Number.isFinite(Number(def.minIntervalMs)) ? Number(def.minIntervalMs) : 0);
      const last = Number.isFinite(soundLastPlayedAt[key]) ? soundLastPlayedAt[key] : -Infinity;
      if (now - last < minGap) return null;

      const base = getSoundBaseAudio(key);
      if (!base) return null;
      const player = base.cloneNode(true);
      player.loop = !!o.loop || !!def.loop;
      player.volume = resolveSoundVolume(def, o.volumeMult);
      soundLastPlayedAt[key] = now;
      player.play().catch(() => {});
      return player;
    }

    function stopLoopSound(tag) {
      const timer = soundLoopDelayTimers[tag];
      if (timer) {
        clearTimeout(timer);
        soundLoopDelayTimers[tag] = null;
      }
      const startAudio = soundStartByTag[tag];
      if (startAudio) {
        startAudio.pause();
        startAudio.currentTime = 0;
      }
      soundStartByTag[tag] = null;
      soundStartKeyByTag[tag] = null;
      const a = soundLoopByTag[tag];
      if (a) {
        a.pause();
        a.currentTime = 0;
      }
      soundLoopByTag[tag] = null;
      soundLoopKeyByTag[tag] = null;
      soundContinuousActive[tag] = false;
    }

    function startLoopSound(tag, key, volumeMult) {
      const def = getSoundDef(key);
      const src = getSoundSrc(def);
      if (!def || !src) return;
      let loopAudio = soundLoopByTag[tag];
      if (!loopAudio || soundLoopKeyByTag[tag] !== key) {
        loopAudio = new Audio(src);
        loopAudio.preload = 'auto';
        loopAudio.loop = true;
        soundLoopByTag[tag] = loopAudio;
        soundLoopKeyByTag[tag] = key;
      }
      loopAudio.volume = resolveSoundVolume(def, volumeMult);
      loopAudio.play().catch(() => {});
    }

    function setContinuousSound(tag, active, startKey, loopKey, loopDelayMs, volumeMult) {
      if (!audioConfig || audioConfig.enabled === false) return;
      if (active) {
        if (soundContinuousActive[tag]) return;
        soundContinuousActive[tag] = true;
        if (startKey) {

          if (startPlayer) {
            soundStartByTag[tag] = startPlayer;
            soundStartKeyByTag[tag] = startKey;
          }
        }
        const delay = Math.max(0, Number(loopDelayMs) || 0);
        if (loopKey) {
          if (delay > 0) {
            const t = setTimeout(() => {
              if (!soundContinuousActive[tag]) return;
              startLoopSound(tag, loopKey, volumeMult);
            }, delay);
            soundLoopDelayTimers[tag] = t;
          } else {
            startLoopSound(tag, loopKey, volumeMult);
          }
        }
      } else {
        if (!soundContinuousActive[tag]) return;
        stopLoopSound(tag);
      }
    }

      if (!weapon || !state || !state.reloading) return null;
      const reloadSeconds = getEffectiveReloadSeconds(weapon);
      return 1 - clamp01(state.reloadTimer / reloadSeconds);
    }

    function formatUpgradeValue(kind, weapon) {
      if (!weapon) return '-';
      if (kind === 'fireRate') {
        const shotsPerSecond = 1 / getEffectiveCooldown(weapon);
        return shotsPerSecond.toFixed(shotsPerSecond >= 10 ? 1 : 2) + '/s';
      }
      if (kind === 'clipSize') {
        if (Number(weapon.batterySeconds) > 0) {
          return getEffectiveClipCapacity(weapon).toFixed(1) + 's';
        }
        return String(getEffectiveClipCapacity(weapon));
      }
      return getEffectiveReloadSeconds(weapon).toFixed(2) + 's';
    }

    function getUpgradeCost(currentLevel) {
      const nextLevel = Math.max(1, Math.min(5, (Number(currentLevel) || 0) + 1));
      return nextLevel * 100;
    }

    function getSecondaryUpgradeCost(weapon, upgradeKey, currentLevel) {
      const cfg = (weaponUpgradeConfig && weaponUpgradeConfig.secondary && weaponUpgradeConfig.secondary.costs) || {};
      const level = Math.max(0, Number(currentLevel) || 0);
      const cat = getSecondaryWeaponCategory(weapon);
      if (upgradeKey === 'amount') {
        const amountCosts = Array.isArray(cfg.amountCostByLevel) && cfg.amountCostByLevel.length ? cfg.amountCostByLevel : [1000, 2000];
        const idx = Math.max(0, Math.min(amountCosts.length - 1, level));
        return Math.max(0, Number(amountCosts[idx]) || 0);
      }
      const baseCosts = Array.isArray(cfg.baseCostByLevel) && cfg.baseCostByLevel.length ? cfg.baseCostByLevel : null;
      const base = baseCosts ? Math.max(0, Number(baseCosts[Math.max(0, Math.min(baseCosts.length - 1, level))]) || 0) : getUpgradeCost(level);
      const multMap = cfg.categoryMultiplier || {};
      const mult = Math.max(0.1, Number(multMap[cat]) || 1);
      return Math.round(base * mult);
    }

    function getPrimaryWeaponDescription(weapon) {

    function detectWeaponMuzzles(img, mode){
      const w = img.naturalWidth || img.width || 1;
      const h = img.naturalHeight || img.height || 1;
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const cx = c.getContext('2d');
      cx.drawImage(img, 0, 0);
      const d = cx.getImageData(0, 0, w, h).data;

      const firstYForX = new Array(w).fill(-1);
      const useRed = mode === 'red-top';
      const useBottom = mode === 'bottom';
      for (let x = 0; x < w; x++) {
        const yStart = useBottom ? h - 1 : 0;
        const yEnd = useBottom ? -1 : h;
        const yStep = useBottom ? -1 : 1;
        for (let y = yStart; y !== yEnd; y += yStep) {
          const i = (y * w + x) * 4;
          const a = d[i + 3];
          if (a < 20) continue;
          const r = d[i], g = d[i + 1], b = d[i + 2];
          const isRed = r > 180 && g < 110 && b < 110;
          if (useRed && !isRed) continue;
          firstYForX[x] = y;
          break;
        }
      }

      let refY = useBottom ? Number.NEGATIVE_INFINITY : Number.POSITIVE_INFINITY;
      for (const y of firstYForX) {
        if (y < 0) continue;
        if (useBottom) { if (y > refY) refY = y; }
        else { if (y < refY) refY = y; }
      }
      if (!Number.isFinite(refY)) {
        return [{ x: 0, y: -SHIP_SIZE * 0.43 }];
      }

      const candidateXs = [];
      for (let x = 0; x < w; x++) {
        const y = firstYForX[x];
        if (y < 0) continue;
        if (useBottom) {
          if (y >= refY - 1) candidateXs.push(x);
        } else {
          if (y <= refY + 1) candidateXs.push(x);
        }
      }
      if (!candidateXs.length) {
        return [{ x: 0, y: -SHIP_SIZE * 0.43 }];
      }

      const clusters = [];
      let run = [candidateXs[0]];
      for (let i = 1; i < candidateXs.length; i++) {
        if (candidateXs[i] === candidateXs[i - 1] + 1) run.push(candidateXs[i]);
        else { clusters.push(run); run = [candidateXs[i]]; }
      }
      clusters.push(run);

      const muzzles = clusters.map(xs => {
        const cxPx = xs.reduce((s, v) => s + v, 0) / xs.length;
        let cyPx = refY;
        for (const x of xs) {
          if (firstYForX[x] < 0) continue;
          if (useBottom) {
            if (firstYForX[x] > cyPx) cyPx = firstYForX[x];
          } else {
            if (firstYForX[x] < cyPx) cyPx = firstYForX[x];
          }
        }
        const localX = ((cxPx + 0.5) / w - 0.5) * SHIP_SIZE;
        const localY = ((cyPx + 0.5) / h - 0.5) * SHIP_SIZE;
        return { x: localX, y: localY };
      });

      return muzzles.sort((a, b) => a.x - b.x);
    }

    function extractRocketParts(img){
      const w = img.naturalWidth || img.width || 1;
      const h = img.naturalHeight || img.height || 1;
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const cx = c.getContext('2d');
      cx.drawImage(img, 0, 0);
      const d = cx.getImageData(0, 0, w, h).data;
      const visited = new Uint8Array(w * h);
      const comps = [];

      function idx(x, y){ return y * w + x; }

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const p = idx(x, y);
          if (visited[p]) continue;
          const ai = p * 4 + 3;
          if (d[ai] < 20) continue;
          let minX = x, minY = y, maxX = x, maxY = y;
          let area = 0;
          const qx = [x], qy = [y];
          visited[p] = 1;
          while (qx.length) {
            const cxp = qx.pop();
            const cyp = qy.pop();
            area += 1;
            if (cxp < minX) minX = cxp;
            if (cxp > maxX) maxX = cxp;
            if (cyp < minY) minY = cyp;
            if (cyp > maxY) maxY = cyp;
            const neigh = [[cxp+1,cyp],[cxp-1,cyp],[cxp,cyp+1],[cxp,cyp-1]];
            for (const n of neigh) {
              const nx = n[0], ny = n[1];
              if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
              const np = idx(nx, ny);
              if (visited[np]) continue;
              visited[np] = 1;
              if (d[np * 4 + 3] < 20) continue;
              qx.push(nx); qy.push(ny);
            }
          }
          if (area >= 6) comps.push({ minX, minY, maxX, maxY, area, cx: (minX + maxX) * 0.5 });
        }
      }

      comps.sort((a, b) => b.area - a.area);
      const top = comps.slice(0, 2).sort((a, b) => a.cx - b.cx);
      if (top.length < 2) return null;

      const out = [];
      for (const b of top) {
        const pad = 1;
        const sx = Math.max(0, b.minX - pad);
        const sy = Math.max(0, b.minY - pad);
        const sw = Math.min(w - sx, (b.maxX - b.minX + 1) + pad * 2);
        const sh = Math.min(h - sy, (b.maxY - b.minY + 1) + pad * 2);
        const rc = document.createElement('canvas');
        rc.width = sw; rc.height = sh;
        const rctx = rc.getContext('2d');
        rctx.drawImage(c, sx, sy, sw, sh, 0, 0, sw, sh);
        out.push(rc);
      }
      return out;
    }

    // For rocket_launcher: extract the smallest distinct component (the mini-rocket projectile at top)
    function extractSmallestRocketPart(img) {
      const w = img.naturalWidth || img.width || 1;
      const h = img.naturalHeight || img.height || 1;
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const cx = c.getContext('2d');
      cx.drawImage(img, 0, 0);
      const d = cx.getImageData(0, 0, w, h).data;
      const visited = new Uint8Array(w * h);
      const comps = [];
      function idx(x, y){ return y * w + x; }
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const p = idx(x, y);
          if (visited[p]) continue;
          const ai = p * 4 + 3;
          if (d[ai] < 20) continue;
          let minX = x, minY = y, maxX = x, maxY = y, area = 0;
          const qx = [x], qy = [y];
          visited[p] = 1;
          while (qx.length) {
            const cxp = qx.pop(), cyp = qy.pop();
            area++;
            if (cxp < minX) minX = cxp; if (cxp > maxX) maxX = cxp;
            if (cyp < minY) minY = cyp; if (cyp > maxY) maxY = cyp;
            for (const [nx, ny] of [[cxp+1,cyp],[cxp-1,cyp],[cxp,cyp+1],[cxp,cyp-1]]) {
              if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
              const np = idx(nx, ny);
              if (visited[np]) continue;
              visited[np] = 1;
              if (d[np * 4 + 3] < 20) continue;
              qx.push(nx); qy.push(ny);
            }
          }
          if (area >= 3) comps.push({ minX, minY, maxX, maxY, area, pixels: [] });
        }
      }
      for (const comp of comps) {
        comp.pixels = [];
      }
      visited.fill(0);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const p = idx(x, y);
          if (visited[p]) continue;
          const ai = p * 4 + 3;
          if (d[ai] < 20) continue;
          const qx = [x], qy = [y], pixels = [];
          visited[p] = 1;
          let minX = x, minY = y, maxX = x, maxY = y, area = 0;
          while (qx.length) {
            const cxp = qx.pop(), cyp = qy.pop();
            area++;
            pixels.push([cxp, cyp]);
            if (cxp < minX) minX = cxp; if (cxp > maxX) maxX = cxp;
            if (cyp < minY) minY = cyp; if (cyp > maxY) maxY = cyp;
            for (const [nx, ny] of [[cxp+1,cyp],[cxp-1,cyp],[cxp,cyp+1],[cxp,cyp-1]]) {
              if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
              const np = idx(nx, ny);
              if (visited[np]) continue;
              visited[np] = 1;
              if (d[np * 4 + 3] < 20) continue;
              qx.push(nx); qy.push(ny);
            }
          }
          if (area >= 3) {
            const comp = comps.find(cmp => cmp.minX === minX && cmp.minY === minY && cmp.maxX === maxX && cmp.maxY === maxY && cmp.area === area);
            if (comp) comp.pixels = pixels;
          }
        }
      }
      // Pick the smallest component (the mini-rocket) that isn't a stray speck
      comps.sort((a, b) => a.area - b.area);
      const pick = comps[0];
      if (!pick) return null;
      const pad = 1;
      const sx = Math.max(0, pick.minX - pad);
      const sy = Math.max(0, pick.minY - pad);
      const sw = Math.min(w - sx, (pick.maxX - pick.minX + 1) + pad * 2);
      const sh = Math.min(h - sy, (pick.maxY - pick.minY + 1) + pad * 2);
      const rc = document.createElement('canvas');
      rc.width = sw; rc.height = sh;
      rc.getContext('2d').drawImage(c, sx, sy, sw, sh, 0, 0, sw, sh);
      const cleaned = document.createElement('canvas');
      cleaned.width = w; cleaned.height = h;
      const cleanedCtx = cleaned.getContext('2d');
      cleanedCtx.drawImage(c, 0, 0);
      const cleanedData = cleanedCtx.getImageData(0, 0, w, h);
      for (const [px, py] of pick.pixels || []) {
        cleanedData.data[(py * w + px) * 4 + 3] = 0;
      }
      cleanedCtx.putImageData(cleanedData, 0, 0);
      return { parts: [rc, rc], cleanedImage: cleaned }; // same projectile for both launch slots
    }

    function buildSpreadOffsets(count, spreadDeg){
      const n = Math.max(1, Number(count) || 1);
      const spread = (Number(spreadDeg) || 0) * Math.PI / 180;
      if (n === 1 || spread <= 0) return [0];
      const out = [];
      for (let i = 0; i < n; i++) {
        const t = n === 1 ? 0.5 : i / (n - 1);
        out.push((t - 0.5) * spread);
      }
      return out;
    }

    function rotatePoint(x, y, a){
      const c = Math.cos(a), s = Math.sin(a);
      return { x: x * c - y * s, y: x * s + y * c };
    }

    function getWeaponWorldMuzzles(weapon){
      const w = weapon || getCurrentWeapon();
      if (!w) return [];
      const sp = getShipPos();
      const spriteAngle = shipAngle + Math.PI / 2;
      const raw = (w.muzzles && w.muzzles.length) ? w.muzzles : [{ x: 0, y: -SHIP_SIZE * 0.43 }];
      const spacing = Number.isFinite(Number(w.muzzleSpacingScale)) ? Number(w.muzzleSpacingScale) : 1;
      let muzzles = raw.map(m => ({ x: m.x * spacing, y: m.y }));
      if (w.barrelMode === 'single-center' && muzzles.length > 1) {
        muzzles = [muzzles[Math.floor(muzzles.length / 2)]];
      }
      return muzzles.map(m => {
        const rp = rotatePoint(m.x, m.y, spriteAngle);
        return { x: sp.x + rp.x, y: sp.y + rp.y };
      });
    }

    function spawnProjectile(x, y, a, projectile, sourceWeapon){

    function getImageLikeSize(img) {
      if (!img) return null;
      const w = img.naturalWidth || img.width || 0;
      const h = img.naturalHeight || img.height || 0;
      if (!w || !h) return null;
      return { w, h };
    }

    function getOpaqueBounds(img) {
      const size = getImageLikeSize(img);
      if (!size) return null;
      const c = document.createElement('canvas');
      c.width = size.w;
      c.height = size.h;
      const cx = c.getContext('2d');
      cx.drawImage(img, 0, 0, size.w, size.h);
      const data = cx.getImageData(0, 0, size.w, size.h).data;
      let minX = size.w, minY = size.h, maxX = -1, maxY = -1;
      for (let y = 0; y < size.h; y++) {
        for (let x = 0; x < size.w; x++) {
          if (data[(y * size.w + x) * 4 + 3] < 20) continue;
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }
      }
      if (maxX < minX || maxY < minY) return { sx: 0, sy: 0, sw: size.w, sh: size.h };
      return { sx: minX, sy: minY, sw: maxX - minX + 1, sh: maxY - minY + 1 };
    }

    function getUpgradeIconSource(weapon, mode) {
      if (!weapon) return null;
      if (mode !== 'secondary') return weaponImages[weapon.id] || null;

      const baseImg = weaponImages[weapon.id] || null;
      if (weapon.rocketProjectileMode === 'smallest') {
        const launcherParts = baseImg ? extractRocketParts(baseImg) : null;
        return (launcherParts && launcherParts[0]) ? launcherParts[0] : baseImg;
      }

      const singlePart = rocketPartImages[weapon.id];
      if (singlePart && singlePart[0]) return singlePart[0];
      return baseImg;
    }

    function drawUpgradeIcon(iconCtx, img, mode) {
      if (!img) return;
      const size = getImageLikeSize(img);
      if (!size) return;
      const bounds = getOpaqueBounds(img);
      if (!bounds) return;
      const target = iconCtx.canvas.width || 54;
      const pad = mode === 'primary' ? 4 : 3;
      const maxSize = target - pad * 2;
      const scale = Math.min(maxSize / bounds.sw, maxSize / bounds.sh);
      const dw = Math.max(1, Math.round(bounds.sw * scale));
      const dh = Math.max(1, Math.round(bounds.sh * scale));
      const dx = Math.round((target - dw) / 2);
      const dy = Math.round((target - dh) / 2);
      iconCtx.drawImage(img, bounds.sx, bounds.sy, bounds.sw, bounds.sh, dx, dy, dw, dh);
    }

    function drawShipLayers(ctx, dx, dy, size, levelsOverride) {
      const lvls = levelsOverride || shipUpgradeLevels;

      // Pick body and engine overlays based on armor tier

      const eng3Img   = armorLvl >= 3 ? imgShipEliteEngines2: armorLvl >= 2 ? imgShipHeavyEngines2: imgShipEngines3;
      if (getImageLikeSize(bodyImg)) ctx.drawImage(bodyImg, dx, dy, size, size);
      const engLvl = lvls.engine || 1;
      if (engLvl >= 2 && getImageLikeSize(eng2Img)) ctx.drawImage(eng2Img, dx, dy, size, size);
      if (engLvl >= 3 && getImageLikeSize(eng3Img)) ctx.drawImage(eng3Img, dx, dy, size, size);
      const sdLvl = lvls.selfDestruct || 1;
      if (sdLvl >= 3 && getImageLikeSize(imgShipSelfDestruct3)) ctx.drawImage(imgShipSelfDestruct3, dx, dy, size, size);
      else if (sdLvl >= 2 && getImageLikeSize(imgShipSelfDestruct2)) ctx.drawImage(imgShipSelfDestruct2, dx, dy, size, size);

        btn.style.cssText = 'width:100%;height:88px;border-radius:8px;border:1px solid ' + (isLocked ? '#1e2a35' : (isSelected ? '#59d38c' : (isPreview ? '#66a9ff' : (owned ? '#375268' : '#5a6168')))) + ';background:' + (isLocked ? 'rgba(10,15,22,0.72)' : (isSelected ? 'rgba(31,95,58,0.34)' : (isPreview ? 'rgba(30,63,104,0.44)' : 'linear-gradient(180deg,rgba(32,37,44,0.97) 0%,rgba(14,17,22,0.98) 100%)'))) + ';display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 2px;cursor:' + (isLocked ? 'default' : 'pointer') + ';box-shadow:' + (isSelected ? '0 0 0 1px rgba(89,211,140,0.28) inset' : (isPreview ? '0 0 0 1px rgba(102,169,255,0.35) inset' : 'none')) + ';position:relative;box-sizing:border-box;';

        const icon = document.createElement('canvas');
        icon.width = 70;
        icon.height = 70;
        icon.style.cssText = 'width:70px;height:70px;image-rendering:pixelated;filter:' + (isLocked ? 'brightness(0)' : (owned ? (isSelected ? 'none' : 'grayscale(0.35) brightness(0.85)') : 'grayscale(1) brightness(0.52)')) + ';opacity:' + (isLocked ? '0.7' : (owned ? (isSelected ? '1' : '0.95') : '0.8')) + ';';
        const iconCtx = icon.getContext('2d');
        iconCtx.imageSmoothingEnabled = false;
        const img = getUpgradeIconSource(w, mode);
        drawUpgradeIcon(iconCtx, img, mode);
        btn.appendChild(icon);

        const lbl = document.createElement('div');
        lbl.textContent = w ? w.name : '';
        lbl.style.cssText = 'font:600 8px sans-serif;color:' + (isLocked ? '#2e3d4d' : '#bfd4e6') + ';letter-spacing:0.02em;line-height:1.1;text-align:center;padding:0 2px;width:100%;';
        btn.appendChild(lbl);

        const badge = document.createElement('div');
        if (isSelected) {
          badge.textContent = '\u2713'; badge.style.cssText = 'font:700 11px sans-serif;color:#59d38c;';
        } else if (owned && !isLocked) {
          badge.textContent = '\u2713'; badge.style.cssText = 'font:700 11px sans-serif;color:#375268;';
        } else if (cost > 0) {
          badge.textContent = '$' + cost; badge.style.cssText = 'font:700 9px sans-serif;color:' + (isLocked ? '#4a5a6a' : (canAfford ? '#f7df8a' : '#6a7a8a')) + ';';
        }
        btn.appendChild(badge);

        if (canAfford && !isPreview) btn.classList.add('upgrade-affordable');

        btn.addEventListener('click', () => {
          if (!w) return;
          if (isLocked) { playSound(audioConfig.events && audioConfig.events.deny); return; }
          const currentPreviewId = mode === 'primary' ? upgradePreviewPrimaryId : upgradePreviewSecondaryId;
          if (currentPreviewId !== w.id) {
            if (mode === 'primary') upgradePreviewPrimaryId = w.id;
            else upgradePreviewSecondaryId = w.id;
            playSound(audioConfig.events && audioConfig.events.select);
            renderUpgradeMenu();
            return;
          }

          const ownedNow = isWeaponOwned(w);
          if (!ownedNow) {
            if (cost <= 0) {
              ownedWeaponIds[w.id] = true;
              playSound(audioConfig.events && audioConfig.events.accept);
            } else if (cash >= cost) {
              cash -= cost;
              updateCashCounter();
              ownedWeaponIds[w.id] = true;
              playSound(audioConfig.events && audioConfig.events.accept);
            } else {
              playSound(audioConfig.events && audioConfig.events.deny);
              return;
            }
          } else {
            playSound(audioConfig.events && audioConfig.events.select);
          }
          if (mode === 'primary') {
            const prev = getCurrentWeapon();
            currentWeaponId = w.id;
            fireTimer = 0;
            if (prev && prev.type === 'electric' && (!w || w.type !== 'electric')) {
              clearElectricEffects();
            }
          } else {
            currentRocketId = w.id;
          }
          renderUpgradeMenu();
        });
        return btn;
      }

      function makeSection(title, ids, mode) {
        const section = document.createElement('section');
        section.style.cssText = 'display:flex;flex-direction:column;gap:4px;padding:7px 8px;border:1px solid rgba(185,196,210,0.72);border-radius:9px;background:linear-gradient(180deg,rgba(32,37,44,0.97) 0%,rgba(14,17,22,0.98) 100%);width:100%;box-sizing:border-box;';

        const heading = document.createElement('div');
        heading.textContent = title;
        heading.style.cssText = 'font-size:11px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.78;';
        section.appendChild(heading);

        const grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:6px;';
        const enabledIds = ids.filter(id => { const w2 = getWeaponById(id); return w2 && w2.enabled; });
        for (let i = 0; i < enabledIds.length; i++) {
          const w = getWeaponById(enabledIds[i]);
          const prevW = i > 0 ? getWeaponById(enabledIds[i - 1]) : null;
          const locked = !!(prevW && !isWeaponOwned(prevW));
          grid.appendChild(makeIconButton(w, mode, locked));
        }
        section.appendChild(grid);
        return section;
      }

      function makeUpgradeButton(label, value, level, cost, onClick, disabled, maxLvl) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.disabled = !!disabled;
        const mx = maxLvl || 5;
        btn.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:5px 4px;border-radius:8px;border:1px solid ' + (disabled ? '#334758' : 'rgba(185,196,210,0.72)') + ';background:' + (disabled ? 'linear-gradient(180deg,rgba(32,37,44,0.55) 0%,rgba(14,17,22,0.58) 100%)' : 'linear-gradient(180deg,rgba(32,37,44,0.97) 0%,rgba(14,17,22,0.98) 100%)') + ';color:' + (disabled ? '#7f97ab' : '#d8ebff') + ';cursor:' + (disabled ? 'default' : 'pointer') + ';font:600 10px sans-serif;text-align:center;';
        btn.innerHTML = '<span style="font-size:10px;letter-spacing:0.03em;opacity:0.95;">' + label + '</span><span style="font-size:9px;opacity:0.72;">Lv ' + level + '/' + mx + '</span><span style="font-size:9px;opacity:0.78;">' + (level >= mx ? 'MAX' : '$' + cost) + '</span>';
        if (!disabled) btn.addEventListener('click', onClick);
        if (!disabled) btn.classList.add('upgrade-affordable');
        return btn;
      }

      function renderPrimaryDetails() {
        if (!primaryControls || !primaryDescription) return;
        if (upgradeMenuTab !== 'primary') {
          primaryControls.style.visibility = 'hidden';
          primaryControls.innerHTML = '';
          primaryDescription.style.visibility = 'hidden';
          primaryDescription.innerHTML = '';
          return;
        }

        const weapon = getPreviewWeapon('primary');
        if (!isPrimaryUpgradeableWeapon(weapon)) {
          primaryControls.style.visibility = 'hidden';
          primaryControls.innerHTML = '';
          primaryDescription.style.visibility = 'hidden';
          primaryDescription.innerHTML = '';
          return;
        }

        if (!isWeaponOwned(weapon)) {
          primaryControls.style.visibility = 'hidden';
          primaryControls.innerHTML = '';
          primaryDescription.style.visibility = 'visible';
          const buyCost = getWeaponPurchaseCost(weapon);
          const canAffordBuy = cash >= buyCost;
          primaryDescription.innerHTML = '<div style="font-size:13px;font-weight:700;color:#e8f4ff;margin-bottom:6px;">' + weapon.name + '</div><div style="font-size:11px;color:' + (canAffordBuy ? '#f7df8a' : '#e06060') + ';margin-bottom:5px;">Cost: $' + buyCost + (!canAffordBuy ? ' (insufficient funds)' : '') + '</div><div>' + getPrimaryWeaponDescription(weapon) + '</div>';
          return;
        }

        const upgrades = getWeaponUpgradeState(weapon);
        const state = getWeaponRuntimeState(weapon);
        primaryControls.style.visibility = 'visible';
        primaryControls.innerHTML = '';

        const fireLevel = upgrades.fireRate || 0;
        const fireMax = getPrimaryUpgradeMaxLevel(weapon, 'fireRate');
        const fireCost = getPrimaryUpgradeCost(weapon, 'fireRate', fireLevel);
        const fireDisabled = fireLevel >= fireMax || cash < fireCost;
        primaryControls.appendChild(makeUpgradeButton('Fire Rate', formatUpgradeValue('fireRate', weapon), fireLevel, fireCost, () => {
          if (fireLevel >= fireMax || cash < fireCost) return;
          cash -= fireCost;
          updateCashCounter();
          upgrades.fireRate += 1;
          renderUpgradeMenu();
        }, fireDisabled, fireMax));

        const clipLevel = upgrades.clipSize || 0;
        const clipMax = getPrimaryUpgradeMaxLevel(weapon, 'clipSize');
        const clipCost = getPrimaryUpgradeCost(weapon, 'clipSize', clipLevel);
        const clipDisabled = clipLevel >= clipMax || cash < clipCost;
        primaryControls.appendChild(makeUpgradeButton(weapon.type === 'flamethrower' ? 'Gas Tank' : Number(weapon.batterySeconds) > 0 ? 'Battery' : 'Clip Size', formatUpgradeValue('clipSize', weapon), clipLevel, clipCost, () => {
          if (clipLevel >= clipMax || cash < clipCost) return;
          cash -= clipCost;
          updateCashCounter();
          upgrades.clipSize += 1;
          syncWeaponRuntimeState(weapon, state);
          renderUpgradeMenu();
        }, clipDisabled, clipMax));

        const reloadLevel = upgrades.reloadSpeed || 0;
        const reloadMax = getPrimaryUpgradeMaxLevel(weapon, 'reloadSpeed');
        const reloadCost = getPrimaryUpgradeCost(weapon, 'reloadSpeed', reloadLevel);
        const reloadDisabled = reloadLevel >= reloadMax || cash < reloadCost;
        primaryControls.appendChild(makeUpgradeButton('Reload Speed', formatUpgradeValue('reloadSpeed', weapon), reloadLevel, reloadCost, () => {
          if (reloadLevel >= reloadMax || cash < reloadCost) return;
          cash -= reloadCost;
          updateCashCounter();
          upgrades.reloadSpeed += 1;
          if (state && state.reloading) {
            state.reloadTimer = Math.min(state.reloadTimer, getEffectiveReloadSeconds(weapon));
          }
          renderUpgradeMenu();
        }, reloadDisabled, reloadMax));

        primaryDescription.style.visibility = 'visible';
        const anyUpgradeAvailable = [fireLevel < fireMax, clipLevel < clipMax, reloadLevel < reloadMax].some(Boolean);
        const anyAffordable = anyUpgradeAvailable && [
          fireLevel < fireMax && cash >= fireCost,
          clipLevel < clipMax && cash >= clipCost,
          reloadLevel < reloadMax && cash >= reloadCost
        ].some(Boolean);
        const allMaxed = fireLevel >= fireMax && clipLevel >= clipMax && reloadLevel >= reloadMax;
        primaryDescription.innerHTML = '<div style="font-size:13px;font-weight:700;color:#e8f4ff;margin-bottom:6px;">' + weapon.name + '</div>' +
          (!allMaxed && !anyAffordable ? '<div style="font-size:11px;color:#e06060;margin-bottom:5px;">Insufficient funds for upgrades.</div>' : '') +
          '<div>' + getPrimaryWeaponDescription(weapon) + '</div>';
      }

      function renderSecondaryDetails() {
        if (!primaryControls || !primaryDescription) return;
        if (upgradeMenuTab !== 'secondary') return;
        const weapon = getPreviewWeapon('secondary');
        const cat = weapon ? getSecondaryWeaponCategory(weapon) : null;
        if (!weapon || !cat) {
          primaryControls.style.visibility = 'hidden';
          primaryControls.innerHTML = '';
          primaryDescription.style.visibility = 'visible';
          primaryDescription.innerHTML = '<div style="font-size:11px;opacity:0.74;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;">Secondary Weapon</div><div style="opacity:0.6;">No secondary weapon selected.</div>';
          return;
        }

        if (!isWeaponOwned(weapon)) {
          primaryControls.style.visibility = 'hidden';
          primaryControls.innerHTML = '';
          primaryDescription.style.visibility = 'visible';
          const buyCost = getWeaponPurchaseCost(weapon);
          const canAffordBuy = cash >= buyCost;
          primaryDescription.innerHTML = '<div style="font-size:13px;font-weight:700;color:#e8f4ff;margin-bottom:6px;">' + weapon.name + '</div><div style="font-size:11px;color:' + (canAffordBuy ? '#f7df8a' : '#e06060') + ';margin-bottom:5px;">Cost: $' + buyCost + (!canAffordBuy ? ' (insufficient funds)' : '') + '</div><div>' + getPrimaryWeaponDescription(weapon) + '</div>';
          return;
        }

        const upgrades = getWeaponUpgradeState(weapon);
        const defs = getSecondaryUpgradeDefsByWeapon(weapon);
        primaryControls.style.visibility = 'visible';
        primaryControls.innerHTML = '';

        function formatSecVal(k) {
          if (k === 'reloadSpeed') return getEffectiveReloadSeconds(weapon).toFixed(1) + 's';
          if (k === 'blastRadius') return Math.round(getEffectiveRocketBlastRadius(weapon)) + 'px';
          if (k === 'flightSpeed') return getEffectiveRocketFlightSpeed(weapon).toFixed(1) + '/s';
          if (k === 'amount') return getEffectiveRocketCapacity(weapon) + ' rkt';
          return '-';
        }

        for (const def of defs) {
          const lvl = upgrades[def.key] || 0;
          const maxLvl = Math.max(1, Number(def.maxLvl) || 5);
          const cost = getSecondaryUpgradeCost(weapon, def.key, lvl);
          const maxed = lvl >= maxLvl;
          const disabled = maxed || cash < cost;
          const capturedDef = def;
          primaryControls.appendChild(makeUpgradeButton(capturedDef.label, formatSecVal(capturedDef.key), lvl, cost, () => {
            const curLvl = upgrades[capturedDef.key] || 0;
            const curCost = getSecondaryUpgradeCost(weapon, capturedDef.key, curLvl);
            if (curLvl >= maxLvl || cash < curCost) return;
            cash -= curCost;
            updateCashCounter();
            upgrades[capturedDef.key] = curLvl + 1;
            if (capturedDef.key === 'amount') {
              const st = getWeaponRuntimeState(weapon);
              if (st && !st.reloading) {
                const newCap = getEffectiveRocketCapacity(weapon);
                const old = st.rocketLoaded || [];
                st.rocketLoaded = Array.from({length: newCap}, (_, i) => i < old.length ? !!old[i] : true);
                st.maxClip = newCap;
                if (st.clip !== undefined) st.clip = Math.min(newCap, (st.clip || 0) + 2);
              }
            }
            renderUpgradeMenu();
          }, disabled, maxLvl));
        }

        primaryDescription.style.visibility = 'visible';
        const anySecAffordable = defs.some(def => {
          const lvl = upgrades[def.key] || 0;
          const maxLvl = Math.max(1, Number(def.maxLvl) || 5);
          return lvl < maxLvl && cash >= getSecondaryUpgradeCost(weapon, def.key, lvl);
        });
        const allSecMaxed = defs.every(def => (upgrades[def.key] || 0) >= Math.max(1, Number(def.maxLvl) || 5));
        primaryDescription.innerHTML = '<div style="font-size:13px;font-weight:700;color:#e8f4ff;margin-bottom:6px;">' + weapon.name + '</div>' +
          (!allSecMaxed && !anySecAffordable ? '<div style="font-size:11px;color:#e06060;margin-bottom:5px;">Insufficient funds for upgrades.</div>' : '') +
          '<div>' + (weaponDescriptions[weapon.id] || 'Experimental secondary weapon platform.') + '</div>';
      }

      function renderShipDetails() {
        if (!primaryControls || !primaryDescription) return;
        if (upgradeMenuTab !== 'ship') return;
        primaryControls.style.visibility = 'hidden';
        primaryControls.innerHTML = '';
        const SHIP_ITEM_DATA = {};
        for (const sKey of ['armor', 'engine', 'selfDestruct']) {
          (getShipSysCfg(sKey)).forEach((lvlCfg, i) => {

          });
        }
        for (const pk of ['eachAndEverything', 'wwwwtsactp', 'seraphSecure']) {
          const pc = getProtectCfg(pk);
          SHIP_ITEM_DATA['protect_' + pk] = { name: pc.name || pk, desc: pc.description || '' };
        }
        const pid = upgradePreviewShipId || 'armor_1';
        const data = SHIP_ITEM_DATA[pid] || { name: pid, desc: '' };

        // Early return for protection items
        const PROTECT_COSTS_MAP = {
          protect_eachAndEverything: Number(getProtectCfg('eachAndEverything').cost) || 2000,

          protect_seraphSecure:      Number(getProtectCfg('seraphSecure').cost)      || 20000
        };
        const PROTECT_OWNED_MAP = { protect_eachAndEverything: 'eachAndEverything', protect_wwwwtsactp: 'wwwwtsactp', protect_seraphSecure: 'seraphSecure' };
        if (pid in PROTECT_COSTS_MAP) {
          const pOwn = shipProtectionOwned[PROTECT_OWNED_MAP[pid]];
          const pCost = PROTECT_COSTS_MAP[pid];
          const pAfford = !pOwn && cash >= pCost;
          primaryDescription.style.visibility = 'visible';
          primaryDescription.innerHTML =
            '<div style="font-size:13px;font-weight:700;color:#e8f4ff;margin-bottom:6px;">' + data.name + '</div>' +

        const owned = currentLvl >= targetLevel;

        const canAfford = !owned && !isLocked && cash >= cost;
        primaryDescription.style.visibility = 'visible';
        primaryDescription.innerHTML =
          '<div style="font-size:13px;font-weight:700;color:#e8f4ff;margin-bottom:6px;">' + data.name + '</div>' +
          (owned ? '<div style="color:#59d38c;font-size:11px;margin-bottom:5px;">Installed</div>' : '') +
          (isLocked ? '<div style="color:#e06060;font-size:11px;margin-bottom:5px;">Locked -- upgrade previous tier first.</div>' : '') +
          (!owned && !isLocked ? '<div style="margin-bottom:5px;font-size:11px;color:' + (canAfford ? '#f7df8a' : '#e06060') + ';">Cost: $' + cost.toLocaleString() + (!canAfford ? ' (insufficient funds)' : '') + '</div>' : '') +
          '<div style="font-size:11px;line-height:1.45;opacity:0.82;">' + data.desc + '</div>';
      }

      tabBar.innerHTML = '';
      for (const tab of tabs) {

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = tab.label;
        btn.style.cssText = 'padding:7px 6px;border-radius:8px;border:1px solid ' + (active ? '#59d38c' : 'rgba(185,196,210,0.72)') + ';background:' + (active ? 'rgba(31,95,58,0.34)' : 'linear-gradient(180deg,rgba(32,37,44,0.97) 0%,rgba(14,17,22,0.98) 100%)') + ';color:' + (active ? '#eafff0' : '#bfd4e6') + ';font:600 11px sans-serif;letter-spacing:0.02em;cursor:pointer;white-space:nowrap;text-align:center;';
        btn.addEventListener('click', () => {
          upgradeMenuTab = tab.id;
          if (tab.id === 'ship' && !/^((armor|engine|selfDestruct)_[123]|protect_[A-Za-z0-9_]+)$/.test(String(upgradePreviewShipId || ''))) {
            upgradePreviewShipId = 'armor_' + Math.max(1, Number(shipUpgradeLevels.armor) || 1);
          }
          renderUpgradeMenu();
        });
        tabBar.appendChild(btn);

      sectionsHost.innerHTML = '';
      if (upgradeMenuTab === 'ship') {
        const SHIP_SECS = [
          { title: shipSystemsConfig.armor.title || 'Armor',               key: 'armor',
            items: (getShipSysCfg('armor')).map((c, i) => ({ level: i + 1, name: c.name, cost: Number(c.cost) || 0, img: [imgShipBody, imgShipHeavyBody, imgShipEliteBody][i] || imgShipBody }))
          },
          { title: shipSystemsConfig.engine.title || 'Engines',            key: 'engine',
            items: (getShipSysCfg('engine')).map((c, i) => ({ level: i + 1, name: c.name, cost: Number(c.cost) || 0, img: [imgShipBody, imgShipEngines2, imgShipEngines3][i] || imgShipBody }))
          },
          { title: shipSystemsConfig.selfDestruct.title || 'Self-Destruct', key: 'selfDestruct',
            items: (getShipSysCfg('selfDestruct')).map((c, i) => ({ level: i + 1, name: c.name, cost: Number(c.cost) || 0, img: [imgShipBody, imgShipSelfDestruct2, imgShipSelfDestruct3][i] || imgShipBody }))

          const heading = document.createElement('div');
          heading.textContent = sec.title;
          heading.style.cssText = 'font-size:11px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.78;';
          section.appendChild(heading);
          const grid = document.createElement('div');
          grid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:6px;';
          const currentLvl = Math.max(1, Number(shipUpgradeLevels[sec.key]) || 1);
          for (let i = 0; i < sec.items.length; i++) {
            const item = sec.items[i];
            const owned = currentLvl >= item.level;
            const isInstalledTier = item.level === currentLvl;
            const prevOwned = item.level <= 1 || currentLvl >= item.level - 1;
            const isLocked = !prevOwned;
            const cost = item.level <= 1 ? 0 : (item.cost || 0);
            const canAfford = !owned && !isLocked && cash >= cost;
            const previewKey = sec.key + '_' + item.level;
            const isPreview = (upgradePreviewShipId === previewKey) || isInstalledTier;
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.title = isLocked ? 'Locked \u2014 upgrade previous tier first' : (owned ? item.name + ' (Installed)' : item.name + ' \u2014 $' + cost.toLocaleString());
            btn.style.cssText = 'width:100%;height:88px;border-radius:8px;border:1px solid ' +
              (isLocked ? '#1e2a35' : (isPreview ? '#66a9ff' : (owned ? '#375268' : '#5a6168'))) +
              ';background:' + (isLocked ? 'rgba(10,15,22,0.72)' : (isPreview ? 'rgba(30,63,104,0.44)' : 'linear-gradient(180deg,rgba(32,37,44,0.97) 0%,rgba(14,17,22,0.98) 100%)')) +
              ';display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 2px;cursor:' + (isLocked ? 'default' : 'pointer') +
              ';position:relative;box-shadow:' + (isPreview ? '0 0 0 1px rgba(102,169,255,0.35) inset' : 'none') + ';box-sizing:border-box;';
            const icon = document.createElement('canvas');
            icon.width = 56; icon.height = 56;
            icon.style.cssText = 'width:56px;height:56px;image-rendering:pixelated;display:block;flex-shrink:0;filter:' +

            const iconCtx = icon.getContext('2d');

            btn.appendChild(lbl);

    function drawExtraMountedRocketPairs(drawCtx, rocketWeapon, rocketState, renderSize) {
      if (!drawCtx || !rocketWeapon) return;
      if (rocketWeapon.rocketProjectileMode === 'smallest') return;
      const cat = getSecondaryWeaponCategory(rocketWeapon);
      if (cat !== 'rockets' && cat !== 'freeze') return;

      const cap = getEffectiveRocketCapacity(rocketWeapon);
      const extraPairs = Math.floor((cap - 2) / 2);
      if (extraPairs <= 0) return;

      const parts = rocketPartImages[rocketWeapon.id] || null;
      const partL = (parts && parts[0]) ? parts[0] : null;
      const partR = (parts && parts[1]) ? parts[1] : null;
      if (!partL && !partR) return;

      const loaded = (rocketState && Array.isArray(rocketState.rocketLoaded)) ? rocketState.rocketLoaded : Array(cap).fill(true);
      const muzzles = Array.isArray(rocketWeapon.muzzles) ? rocketWeapon.muzzles.slice().sort((a, b) => a.x - b.x) : [];
      const outerX = muzzles.length >= 2 ? Math.max(Math.abs(muzzles[0].x), Math.abs(muzzles[muzzles.length - 1].x)) : SHIP_SIZE * 0.24;
      const muzzleY = muzzles.length >= 2 ? (muzzles[0].y + muzzles[muzzles.length - 1].y) * 0.5 : -SHIP_SIZE * 0.20;
      const inwardOffsets = [outerX * 0.58, outerX * 0.25];

      for (let p = 0; p < extraPairs; p++) {
        const xOff = inwardOffsets[Math.min(p, inwardOffsets.length - 1)];
        const slotL = 2 + p * 2;
        const slotR = 3 + p * 2;
        const lLoaded = slotL < loaded.length ? !!loaded[slotL] : true;
        const rLoaded = slotR < loaded.length ? !!loaded[slotR] : true;

        if (partL && lLoaded) {
          drawCtx.save();
          drawCtx.globalAlpha = rocketState && rocketState.reloading ? 0.45 : 0.9;
          const s = Math.min(0.55, renderSize * 0.22 / Math.max(1, partL.height));
          const dw = partL.width * s, dh = partL.height * s;
          drawCtx.drawImage(partL, -xOff - dw * 0.5, muzzleY - dh * 0.5, dw, dh);
          drawCtx.restore();
        }
        if (partR && rLoaded) {
          drawCtx.save();
          drawCtx.globalAlpha = rocketState && rocketState.reloading ? 0.45 : 0.9;
          const s = Math.min(0.55, renderSize * 0.22 / Math.max(1, partR.height));
          const dw = partR.width * s, dh = partR.height * s;
          drawCtx.drawImage(partR, xOff - dw * 0.5, muzzleY - dh * 0.5, dw, dh);
          drawCtx.restore();
        }
      }
    }

    function tryFireRocket(){
      const rocketWeapon = getCurrentRocketWeapon();
      if (!rocketWeapon || !shipAlive || gamePaused) return;
      // Mayo weapons are continuous -- handled by updateMayoWeapon, not click-fire
      if (rocketWeapon.type === 'mayo') return;
      const state = getWeaponRuntimeState(rocketWeapon);
      if (!state) return;
      if (state.reloading) {
        playSound(audioConfig.events && audioConfig.events.emptyClip);
        return;
      }

      const burstMode = rocketWeapon.clipSize > 2; // rocket_launcher style: don't track per-slot loaded
      const capacity = burstMode ? (Number(rocketWeapon.clipSize) || 2) : getEffectiveRocketCapacity(rocketWeapon);

      // Ensure rocketLoaded matches capacity
      if (!Array.isArray(state.rocketLoaded) || state.rocketLoaded.length !== capacity) {
        const old = Array.isArray(state.rocketLoaded) ? state.rocketLoaded : [];
        state.rocketLoaded = Array.from({length: capacity}, (_, i) => i < old.length ? !!old[i] : true);
      }
      if (!Number.isFinite(state.nextRocketSlot)) state.nextRocketSlot = 0;

      const anyLoaded = state.rocketLoaded.some(l => l);
      if (state.clip <= 0 || (!burstMode && !anyLoaded)) {
        playSound(audioConfig.events && audioConfig.events.emptyClip);
        startWeaponReload(rocketWeapon, state);
        return;
      }

      const muzzles = getWeaponWorldMuzzles(rocketWeapon);
      if (!muzzles.length) return;
      const leftIdx = 0;
      const rightIdx = Math.min(1, muzzles.length - 1);

      // Find the next loaded slot
      let logicalSlot = (Number.isFinite(state.nextRocketSlot) ? state.nextRocketSlot : 0) % capacity;
      if (!burstMode) {
        let found = false;
        for (let t = 0; t < capacity; t++) {
          if (state.rocketLoaded[logicalSlot]) { found = true; break; }
          logicalSlot = (logicalSlot + 1) % capacity;
        }
        if (!found) { startWeaponReload(rocketWeapon, state); return; }
      }

      const launchIdx = logicalSlot % 2 === 0 ? leftIdx : rightIdx;
      const launch = muzzles[launchIdx] || muzzles[0];
      const effectiveSpeed = getEffectiveRocketFlightSpeed(rocketWeapon);

      if (rocketWeapon.type === 'syringe') {
        const sCfg = rocketWeapon.syringe || {};
        syringes.push({
          weaponId: rocketWeapon.id,
          spriteSlot: logicalSlot % 2,
          x: launch.x, y: launch.y,
          vx: Math.cos(shipAngle) * effectiveSpeed,
          vy: Math.sin(shipAngle) * effectiveSpeed,
          radius: 5,
          blastRadius: getEffectiveRocketBlastRadius(rocketWeapon),
          freezeDuration: Number.isFinite(Number(sCfg.freezeDuration)) ? Number(sCfg.freezeDuration) : 5,
          freezeDps: Number.isFinite(Number(sCfg.freezeDps)) ? Number(sCfg.freezeDps) : 0,
          color: sCfg.color || 'rgba(100,200,255,0.72)',
          alive: true
        });
      } else {
        const rCfg = rocketWeapon.rocket || {};
        rockets.push({
          weaponId: rocketWeapon.id,
          spriteSlot: logicalSlot % 2,
          x: launch.x, y: launch.y,
          vx: Math.cos(shipAngle) * effectiveSpeed,
          vy: Math.sin(shipAngle) * effectiveSpeed,
          radius: 6,
          blastRadius: getEffectiveRocketBlastRadius(rocketWeapon),
          damage: Number.isFinite(Number(rCfg.damage)) ? Number(rCfg.damage) : 999,
          nukeExplosion: !!(rCfg.nukeExplosion),
          color: '#ff8b47',
          alive: true
        });
      }
      playSound(getWeaponShotSoundKey(rocketWeapon));

      if (!burstMode) state.rocketLoaded[logicalSlot] = false;
      state.nextRocketSlot = (logicalSlot + 1) % capacity;
      state.clip = Math.max(0, state.clip - 1);
      if (state.clip <= 0 || (!burstMode && !state.rocketLoaded.some(l => l))) {
        startWeaponReload(rocketWeapon, state);
      }
    }

    function explodeRocket(x, y, rocket){
      const blastRadius = rocket && rocket.blastRadius ? rocket.blastRadius : 95;
      const isBigBoom = rocket && (rocket.weaponId === 'little_boy' || rocket.weaponId === 'big_papa');
      if (rocket && rocket.nukeExplosion) {
        spawnNukeExplosion(x, y, blastRadius);
      } else {
        spawnExplosion(x, y);
        particles.push({ x, y, ring:true, r:4, life:1, decay:0.018 });

      if (isBigBoom) {

        if (u.dead) continue;
        if (dist(x, y, u.x, u.y) <= blastRadius) {
          applyDamageToUfo(u, 9999);
        }
      }
    }

    async function loadWeaponConfigFromJson(){
      const data = (window && window.WEAPON_CONFIG && typeof window.WEAPON_CONFIG === 'object') ? window.WEAPON_CONFIG : null;

        if (data.upgradeConfig.secondary && data.upgradeConfig.secondary.categories) {

          );

      }

      }
      if (data.shipSystems && typeof data.shipSystems === 'object') {
        const ss = data.shipSystems;
        for (const key of ['armor', 'engine', 'selfDestruct']) {
          if (ss[key] && typeof ss[key] === 'object') {
